<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List a Pet — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .img-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:8px; margin-top:10px; }
    .img-item  { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; border:2px solid #e5e7eb; }
    .img-item.primary { border-color:#2a9d8f; }
    .img-item img { width:100%; height:100%; object-fit:cover; }
    .img-del { position:absolute; top:3px; right:3px; background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:0.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .img-primary-label { position:absolute; bottom:3px; left:3px; background:#2a9d8f; color:#fff; font-size:0.6rem; font-weight:bold; padding:1px 5px; border-radius:3px; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:720px;margin:0 auto">

      <div class="page-header">
        <a href="/pages/my-pets.html" style="font-size:0.86rem;color:#6b7a8d">← My Pets</a>
        <h1 style="margin-top:8px" id="page-title">List a Pet</h1>
      </div>

      <div id="alert-area"></div>

      <div class="card" style="margin-bottom:20px">
        <h3 style="margin-bottom:16px">Basic Information</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Pet Type <span style="color:#e76f51">*</span></label>
            <select id="pet-type" class="form-control"><option value="">Select type...</option></select>
          </div>
          <div class="form-group">
            <label>Name <span style="color:#e76f51">*</span></label>
            <input type="text" id="name" class="form-control" placeholder="Pet's name">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Breed</label>
            <input type="text" id="breed" class="form-control" placeholder="e.g. Golden Retriever">
          </div>
          <div class="form-group">
            <label>Color</label>
            <input type="text" id="color" class="form-control" placeholder="e.g. Golden, Black">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Gender</label>
            <select id="gender" class="form-control">
              <option value="">Unknown</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
          <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" class="form-control" placeholder="e.g. 12.5" step="0.1" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Birth Date</label>
            <input type="date" id="birth-date" class="form-control">
            <span class="form-hint">Used to show age on listing</span>
          </div>
          <div class="form-group" style="padding-top:26px">
            <label class="form-check">
              <input type="checkbox" id="is-sure">
              Exact birthday (not estimated)
            </label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" class="form-control" placeholder="e.g. Sanchaung, Yangon">
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" class="form-control" placeholder="e.g. Yangon">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" class="form-control" rows="4" placeholder="Tell adopters about this pet's personality and habits..."></textarea>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <h3 style="margin-bottom:16px">Health Information</h3>
        <div style="display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap">
          <label class="form-check"><input type="checkbox" id="is-vaccinated"> Vaccinated</label>
          <label class="form-check"><input type="checkbox" id="is-neutered"> Neutered / Spayed</label>
        </div>
        <div class="form-group">
          <label>Health Notes</label>
          <textarea id="health-notes" class="form-control" rows="3" placeholder="Medical history, allergies, medications..."></textarea>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <h3 style="margin-bottom:16px">Adoption Fee</h3>
        <div style="display:flex;gap:20px;margin-bottom:16px">
          <label class="form-check">
            <input type="radio" name="fee-type" id="fee-free" value="free" checked onchange="toggleFeeInput()"> Free adoption
          </label>
          <label class="form-check">
            <input type="radio" name="fee-type" id="fee-paid" value="paid" onchange="toggleFeeInput()"> Paid adoption
          </label>
        </div>
        <div id="fee-input-area" style="display:none">
          <div class="form-group">
            <label>Fee Amount (MMK)</label>
            <input type="number" id="adoption-fee" class="form-control" placeholder="e.g. 50000" min="0">
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:24px">
        <h3 style="margin-bottom:6px">Photos</h3>
        <p style="color:#6b7a8d;font-size:0.86rem;margin-bottom:12px" id="images-note">Save the listing first, then add photos.</p>
        <div id="upload-area" style="display:none">
          <div class="file-upload" onclick="document.getElementById('img-input').click()">
            <input type="file" id="img-input" accept="image/*" multiple onchange="handleImageUpload(this)">
            <div style="font-size:2rem;margin-bottom:6px">📷</div>
            <div style="font-size:0.88rem;color:#6b7a8d"><span style="color:#2a9d8f;font-weight:bold">Click to upload</span></div>
            <div style="font-size:0.76rem;color:#9baab8;margin-top:3px">JPG, PNG, WEBP · max 5MB each</div>
          </div>
          <div id="img-grid" class="img-grid"></div>
        </div>
      </div>

      <div style="display:flex;gap:12px;justify-content:flex-end">
        <a href="/pages/my-pets.html" class="btn btn-secondary">Cancel</a>
        <button class="btn btn-primary" id="save-btn" onclick="savePet()">Save Listing</button>
      </div>

    </div>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var editId = null;
var savedPetId = null;
var existingImages = [];

document.addEventListener('DOMContentLoaded', async function() {
  if (!requireAuth()) return;

  try {
    var res = await PetTypes.list();
    if (res && res.ok) {
      var sel = document.getElementById('pet-type');
      res.data.petTypes.forEach(function(t) {
        var o = document.createElement('option');
        o.value = t.id; o.textContent = t.name;
        sel.appendChild(o);
      });
    }
  } catch(e) {}

  var params = new URLSearchParams(window.location.search);
  editId = params.get('id');
  if (editId) {
    document.getElementById('page-title').textContent = 'Edit Listing';
    document.getElementById('save-btn').textContent = 'Update Listing';
    loadForEdit(editId);
  }
});

async function loadForEdit(id) {
  try {
    var res = await Pets.get(id);
    if (!res || !res.ok) return;
    var p = res.data.pet;
    document.getElementById('pet-type').value    = p.pet_type_id;
    document.getElementById('name').value         = p.name || '';
    document.getElementById('breed').value        = p.breed || '';
    document.getElementById('color').value        = p.color || '';
    document.getElementById('gender').value       = p.gender || '';
    document.getElementById('weight').value       = p.weight_kg || '';
    document.getElementById('location').value     = p.location || '';
    document.getElementById('city').value         = p.city || '';
    document.getElementById('description').value  = p.description || '';
    document.getElementById('health-notes').value = p.health_notes || '';
    document.getElementById('is-vaccinated').checked = !!p.is_vaccinated;
    document.getElementById('is-neutered').checked   = !!p.is_neutered;
    document.getElementById('is-sure').checked        = !!p.is_sure;
    if (p.birth_date) document.getElementById('birth-date').value = p.birth_date.split('T')[0];
    if (p.fee_type === 'paid') {
      document.getElementById('fee-paid').checked = true;
      document.getElementById('fee-input-area').style.display = 'block';
      document.getElementById('adoption-fee').value = p.adoption_fee || '';
    }
    savedPetId = id;
    existingImages = p.images || [];
    document.getElementById('images-note').textContent = 'Manage photos for this listing.';
    document.getElementById('upload-area').style.display = 'block';
    renderImages();
  } catch(e) { showToast('Failed to load pet.', 'error'); }
}

function toggleFeeInput() {
  document.getElementById('fee-input-area').style.display =
    document.getElementById('fee-paid').checked ? 'block' : 'none';
}

async function savePet() {
  var alertArea = document.getElementById('alert-area');
  var btn = document.getElementById('save-btn');
  alertArea.innerHTML = '';

  var petType = document.getElementById('pet-type').value;
  var name    = document.getElementById('name').value.trim();
  
  if (!petType) { alertArea.innerHTML = '<div class="alert alert-danger">Please select a pet type.</div>'; return; }
  if (!name)    { alertArea.innerHTML = '<div class="alert alert-danger">Pet name is required.</div>'; return; }

  // --- NEW: Frontend validations to prevent 500 server errors ---
  
  var weightVal = document.getElementById('weight').value;
  if (weightVal && (isNaN(weightVal) || Number(weightVal) < 0)) {
    alertArea.innerHTML = '<div class="alert alert-danger">Weight must be a valid positive number.</div>';
    return;
  }

  var bd = document.getElementById('birth-date').value;
  if (bd && isNaN(Date.parse(bd))) {
    alertArea.innerHTML = '<div class="alert alert-danger">Please enter a valid birth date.</div>';
    return;
  }

  var feeType = document.getElementById('fee-paid').checked ? 'paid' : 'free';
  var feeAmt  = document.getElementById('adoption-fee').value;
  if (feeType === 'paid' && (!feeAmt || isNaN(feeAmt) || Number(feeAmt) <= 0)) {
    alertArea.innerHTML = '<div class="alert alert-danger">Please enter a valid adoption fee amount.</div>';
    return;
  }

  // --- END VALIDATIONS ---

  var body = {
    pet_type_id:   parseInt(petType),
    name:          name,
    breed:         document.getElementById('breed').value.trim()        || undefined,
    color:         document.getElementById('color').value.trim()        || undefined,
    gender:        document.getElementById('gender').value              || undefined,
    weight_kg:     weightVal                                            || undefined,
    birth_date:    bd                                                    || undefined,
    is_sure:       document.getElementById('is-sure').checked,
    location:      document.getElementById('location').value.trim()    || undefined,
    city:          document.getElementById('city').value.trim()         || undefined,
    description:   document.getElementById('description').value.trim() || undefined,
    health_notes:  document.getElementById('health-notes').value.trim()|| undefined,
    is_vaccinated: document.getElementById('is-vaccinated').checked,
    is_neutered:   document.getElementById('is-neutered').checked,
    fee_type:      feeType,
    adoption_fee:  feeType === 'paid' ? parseFloat(feeAmt) : 0,
  };

  btn.disabled = true;
  btn.textContent = editId ? 'Updating...' : 'Saving...';

  try {
    var res = editId ? await Pets.update(editId, body) : await Pets.create(body);
    if (res && res.ok) {
      var pid = editId || res.data.pet.id;
      savedPetId = pid;
      if (!editId) {
        editId = pid;
        window.history.replaceState({}, '', '/pages/add-pet.html?id=' + pid);
        document.getElementById('images-note').textContent = 'Add photos to your listing.';
        document.getElementById('upload-area').style.display = 'block';
        btn.textContent = 'Update Listing'; // Fix: Update button text since it's now an edit
      }
      showToast(editId ? 'Listing updated!' : 'Saved! Now add photos.', 'success');
      alertArea.innerHTML = '<div class="alert alert-success">Saved! <a href="' + petDetailHref(savedPetId) + '">View listing →</a></div>';
    } else {
      alertArea.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'Failed to save.') + '</div>';
    }
  } catch(e) {
    alertArea.innerHTML = '<div class="alert alert-danger">Something went wrong.</div>';
  }
  
  btn.disabled = false;
  // Fix: Restore correct button text based on whether it's a new pet or editing
  if (!editId) {
    btn.textContent = 'Save Listing';
  }
}

async function handleImageUpload(input) {
  if (!savedPetId) { showToast('Save the listing first.', 'info'); return; }
  var files = Array.from(input.files);
  for (var i = 0; i < files.length; i++) {
    var fd = new FormData();
    fd.append('image', files[i]);
    fd.append('is_primary', (existingImages.length === 0 && i === 0) ? 'true' : 'false');
    try {
      var res = await Pets.addImage(savedPetId, fd);
      if (res && res.ok) { existingImages.push(res.data.image); showToast('Photo uploaded.', 'success'); }
      else showToast('Upload failed: ' + files[i].name, 'error');
    } catch(e) { showToast('Upload error.', 'error'); }
  }
  input.value = '';
  renderImages();
}

function renderImages() {
  var grid = document.getElementById('img-grid');
  if (!existingImages.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = existingImages.map(function(img) {
    return '<div class="img-item' + (img.is_primary ? ' primary' : '') + '">' +
      '<img src="' + imgUrl(img.url) + '" alt="pet">' +
      (img.is_primary ? '<span class="img-primary-label">Main</span>' : '') +
      '<button class="img-del" onclick="deleteImg(' + img.id + ')">✕</button>' +
    '</div>';
  }).join('');
}

async function deleteImg(imgId) {
  if (!confirm('Delete this photo?')) return;
  try {
    var res = await Pets.deleteImage(savedPetId, imgId);
    if (res && res.ok) {
      existingImages = existingImages.filter(function(i){ return i.id !== imgId; });
      renderImages();
      showToast('Photo deleted.', 'success');
    }
  } catch(e) { showToast('Failed.', 'error'); }
}
</script>
</body>
</html>
