<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ပရိုဖိုင် — PetNet</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
      else if (t !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
  .profile-avatar-wrap { text-align:center; margin-bottom:20px; }
.profile-avatar { width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid var(--accent-light-bg); }
.profile-avatar-placeholder { width:90px; height:90px; border-radius:50%; background:var(--accent); color:#fff; font-size:2rem; font-weight:bold; display:flex; align-items:center; justify-content:center; border:3px solid var(--accent-light-bg); margin:0 auto; }
.profile-name { font-size:1.2rem; font-weight:bold; margin-top:10px; }
.profile-email { font-size:0.86rem; color:var(--text-secondary); margin-top:2px; }
.stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px; }
.stat-box { background:var(--bg-chat); border-radius:8px; padding:14px; text-align:center; }
.stat-box-value { font-size:1.4rem; font-weight:bold; color:var(--text-primary); }
.stat-box-label { font-size:0.76rem; color:var(--text-muted); margin-top:2px; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:680px;margin:0 auto">

      <div class="page-header">
        <h1>ကျွန်ုပ်၏ ပရိုဖိုင်</h1>
      </div>

      <div class="stat-row" id="stat-row">
        <div class="stat-box"><div class="stat-box-value" id="stat-pets">—</div><div class="stat-box-label">စာရင်းတင်ထားသော အိမ်မွေးတိရစ္ဆာန်များ</div></div>
        <div class="stat-box"><div class="stat-box-value" id="stat-requests">—</div><div class="stat-box-label">ပေးပို့ထားသော တောင်းဆိုချက်များ</div></div>
        <div class="stat-box"><div class="stat-box-value" id="stat-favorites">—</div><div class="stat-box-label">သိမ်းဆည်းထားသော အိမ်မွေးတိရစ္ဆာန်များ</div></div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px">
        <a href="/pages/my-pets.html" class="btn btn-outline btn-sm">ပို့စ်များ</a>
        <a href="/pages/adoption-requests.html" class="btn btn-outline btn-sm">တောင်းဆိုချက်များ</a>
        <a href="/pages/adoption-requests.html?tab=received" class="btn btn-outline btn-sm">လက်ခံရရှိမှုများ</a>
        <a href="/pages/favorites.html" class="btn btn-outline btn-sm">သိမ်းဆည်းထားသော အိမ်မွေးတိရစ္ဆာန်များ</a>
        <a href="/pages/notifications.html" class="btn btn-outline btn-sm">အကြောင်းကြားချက်များ</a>
        <a href="/pages/messages.html" class="btn btn-outline btn-sm">မက်ဆေ့ခ်ျများ</a>
      </div>

      <div id="tabs-wrap">
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-info">ပရိုဖိုင် အချက်အလက်</button>
          <button class="tab-btn" data-tab="tab-password">စကားဝှက် ပြောင်းရန်</button>
        </div>

        <div class="tab-panel active" id="tab-info">
          <div class="card">
            <div id="profile-alert"></div>

            <div class="profile-avatar-wrap">
              <div id="avatar-display"></div>
              <div class="profile-name" id="display-name"></div>
              <div class="profile-email" id="display-email"></div>
              <label style="margin-top:10px;display:inline-block">
                <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="previewAvatar(this)">
                <span class="btn btn-outline btn-sm" style="cursor:pointer">ဓာတ်ပုံ ပြောင်းရန်</span>
              </label>
              <div id="avatar-preview-area"></div>
            </div>

            <hr class="divider">

            <div class="form-row">
              <div class="form-group">
                <label for="name">အမည်အပြည့်အစုံ</label>
                <input type="text" id="name" class="form-control" placeholder="သင်၏အမည်">
              </div>
              <div class="form-group">
                <label for="phone">ဖုန်း</label>
                <input type="text" id="phone" class="form-control" placeholder="+95 9...">
              </div>
            </div>
            <div class="form-group">
              <label for="address">လိပ်စာ</label>
              <input type="text" id="address" class="form-control" placeholder="မြို့နယ်၊ မြို့">
            </div>

            <div style="display:flex;gap:10px;justify-content:flex-end">
              <button class="btn btn-primary" id="save-profile-btn" onclick="saveProfile()">ပြောင်းလဲမှုများ သိမ်းဆည်းရန်</button>
            </div>
          </div>
        </div>

        <div class="tab-panel" id="tab-password">
          <div class="card">
            <div id="password-alert"></div>
            <div class="form-group">
              <label for="current-pass">လက်ရှိ စကားဝှက်</label>
              <input type="password" id="current-pass" class="form-control" placeholder="လက်ရှိ စကားဝှက် ထည့်ပါ">
            </div>
            <div class="form-group">
              <label for="new-pass">စကားဝှက်အသစ်</label>
              <input type="password" id="new-pass" class="form-control" placeholder="အနည်းဆုံး စာလုံး ၆ လုံး">
            </div>
            <div class="form-group">
              <label for="confirm-pass">စကားဝှက်အသစ် အတည်ပြုရန်</label>
              <input type="password" id="confirm-pass" class="form-control" placeholder="စကားဝှက်အသစ် ထပ်ထည့်ပါ">
            </div>
            <div style="display:flex;justify-content:flex-end">
              <button class="btn btn-primary" id="save-pass-btn" onclick="changePassword()">စကားဝှက် ပြောင်းလဲရန်</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
var currentAvatarUrl = null;
var newAvatarFile    = null;

document.addEventListener('DOMContentLoaded', async function() {
  if (!requireAuth()) return;
  initTabs('tabs-wrap');

  try {
    var res = await User.getProfile();
    if (res && res.ok) {
      var u = res.data.user;
      currentAvatarUrl = u.avatar_url;

      renderAvatar(u.avatar_url, u.name);
      document.getElementById('display-name').textContent  = u.name  || '';
      document.getElementById('display-email').textContent = u.email || '';

      document.getElementById('name').value    = u.name    || '';
      document.getElementById('phone').value   = u.phone   || '';
      document.getElementById('address').value = u.address || '';

      saveAuth(getToken(), u);
      renderNavbar();
    }
  } catch(e) { showToast('ပရိုဖိုင် ဖွင့်၍မရပါ။', 'error'); }

  loadStats();
});

function renderAvatar(url, name) {
  var el = document.getElementById('avatar-display');
  if (url) {
    el.innerHTML = '<img src="' + imgUrl(url) + '" class="profile-avatar" alt="avatar" onerror="this.style.display=\'none\'">';
  } else {
    el.innerHTML = '<div class="profile-avatar-placeholder">' + initials(name || 'U') + '</div>';
  }
}

async function loadStats() {
  try {
    var myPets = await Pets.my();
    if (myPets && myPets.ok) document.getElementById('stat-pets').textContent = (myPets.data.pets || []).length;
  } catch(e) {}
  try {
    var mine = await Adoption.mine();
    if (mine && mine.ok) document.getElementById('stat-requests').textContent = (mine.data.requests || []).length;
  } catch(e) {}
  try {
    var favs = await Favorites.list();
    if (favs && favs.ok) document.getElementById('stat-favorites').textContent = (favs.data.favorites || []).length;
  } catch(e) {}
}

function previewAvatar(input) {
  var file = input.files[0];
  if (!file) return;
  newAvatarFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('avatar-preview-area').innerHTML =
      '<div style="margin-top:10px">' +
        '<img src="' + e.target.result + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #2a9d8f">' +
        '<div style="font-size:0.78rem;color:#2a9d8f;margin-top:4px">ဓာတ်ပုံအသစ် ရွေးချယ်ပြီးပါပြီ — အသုံးပြုရန် သိမ်းဆည်းပါ</div>' +
      '</div>';
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  var alertEl = document.getElementById('profile-alert');
  var btn     = document.getElementById('save-profile-btn');
  alertEl.innerHTML = '';

  var name    = document.getElementById('name').value.trim();
  var phone   = document.getElementById('phone').value.trim();
  var address = document.getElementById('address').value.trim();

  if (!name) { alertEl.innerHTML = '<div class="alert alert-danger">အမည် လိုအပ်ပါသည်။</div>'; return; }

  btn.disabled = true; btn.textContent = 'သိမ်းဆည်းနေသည်...';

  var fd = new FormData();
  fd.append('name', name);
  if (phone)   fd.append('phone',   phone);
  if (address) fd.append('address', address);
  if (newAvatarFile) fd.append('avatar', newAvatarFile);

  try {
    var res = await User.updateProfile(fd);
    if (res && res.ok) {
      var u = res.data.user;
      saveAuth(getToken(), u);
      currentAvatarUrl = u.avatar_url;
      newAvatarFile = null;
      document.getElementById('avatar-preview-area').innerHTML = '';
      renderAvatar(u.avatar_url, u.name);
      document.getElementById('display-name').textContent = u.name;
      renderNavbar();
      showToast('ပရိုဖိုင် အပ်ဒိတ်လုပ်ပြီးပါပြီ။', 'success');
      alertEl.innerHTML = '<div class="alert alert-success">ပရိုဖိုင် အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။</div>';
    } else {
      alertEl.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'သိမ်းဆည်း၍မရပါ။') + '</div>';
    }
  } catch(e) {
    alertEl.innerHTML = '<div class="alert alert-danger">တစ်ခုခု မှားယွင်းသွားသည်။</div>';
  }
  btn.disabled = false; btn.textContent = 'ပြောင်းလဲမှုများ သိမ်းဆည်းရန်';
}

async function changePassword() {
  var alertEl  = document.getElementById('password-alert');
  var btn      = document.getElementById('save-pass-btn');
  var current  = document.getElementById('current-pass').value;
  var newPass  = document.getElementById('new-pass').value;
  var confirm  = document.getElementById('confirm-pass').value;
  alertEl.innerHTML = '';

  if (!current || !newPass) { alertEl.innerHTML = '<div class="alert alert-danger">အကွက်အားလုံး လိုအပ်ပါသည်။</div>'; return; }
  if (newPass.length < 6)   { alertEl.innerHTML = '<div class="alert alert-danger">စကားဝှက်အသစ်သည် အနည်းဆုံး စာလုံး ၆ လုံး ရှိရပါမည်။</div>'; return; }
  if (newPass !== confirm)  { alertEl.innerHTML = '<div class="alert alert-danger">စကားဝှက်များ မတူညီပါ။</div>'; return; }

  btn.disabled = true; btn.textContent = 'ပြောင်းလဲနေသည်...';

  try {
    var res = await User.changePassword({ currentPassword: current, newPassword: newPass });
    if (res && res.ok) {
      document.getElementById('current-pass').value = '';
      document.getElementById('new-pass').value     = '';
      document.getElementById('confirm-pass').value = '';
      showToast('စကားဝှက် ပြောင်းလဲပြီးပါပြီ။', 'success');
      alertEl.innerHTML = '<div class="alert alert-success">စကားဝှက် အောင်မြင်စွာ ပြောင်းလဲပြီးပါပြီ။</div>';
    } else {
      alertEl.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'မအောင်မြင်ပါ။') + '</div>';
    }
  } catch(e) {
    alertEl.innerHTML = '<div class="alert alert-danger">တစ်ခုခု မှားယွင်းသွားသည်။</div>';
  }
  btn.disabled = false; btn.textContent = 'စကားဝှက် ပြောင်းလဲရန်';
}
</script>
</body>
</html>
