<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .notif-item { display:flex; gap:12px; padding:14px 16px; border-bottom:1px solid #e5e7eb; cursor:pointer; transition:background 0.1s; align-items:flex-start; }
    .notif-item:hover { background:#f9f9f7; }
    .notif-item.unread { background:#f0fbfa; }
    .notif-item.unread:hover { background:#e6f5f3; }
    .notif-dot { width:9px; height:9px; border-radius:50%; background:#2a9d8f; flex-shrink:0; margin-top:6px; }
    .notif-dot.read { background:#e5e7eb; }
    .notif-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
    .notif-title { font-size:0.9rem; font-weight:bold; color:#1c2b3a; margin-bottom:2px; }
    .notif-body  { font-size:0.82rem; color:#6b7a8d; margin-bottom:3px; }
    .notif-time  { font-size:0.75rem; color:#9baab8; }
    .notif-del   { background:none; border:none; color:#9baab8; cursor:pointer; font-size:0.9rem; flex-shrink:0; padding:2px 6px; border-radius:4px; margin-left:auto; }
    .notif-del:hover { color:#e76f51; background:#fdf0ec; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:680px;margin:0 auto">

      <div class="page-header-row">
        <div>
          <h1>Notifications</h1>
          <p style="color:#6b7a8d;margin-top:4px" id="unread-label"></p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="markAllRead()">Mark All Read</button>
          <button class="btn btn-outline btn-sm" onclick="clearRead()">Clear Read</button>
        </div>
      </div>

      <!-- FILTER -->
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        <button class="chip active" data-filter="all" onclick="setFilter(this,'all')">All</button>
        <button class="chip" data-filter="unread" onclick="setFilter(this,'unread')">Unread</button>
        <button class="chip" data-filter="adoption" onclick="setFilter(this,'adoption')">Adoption</button>
        <button class="chip" data-filter="payment" onclick="setFilter(this,'payment')">Payment</button>
      </div>

      <!-- LIST -->
      <div class="card" style="padding:0;overflow:hidden">
        <div id="notif-list">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var allNotifications = [];
var currentFilter = 'all';

var NOTIF_ICONS = {
  new_adoption_request: { icon:'📋', bg:'#e6f5f3' },
  adoption_reviewed:    { icon:'✅', bg:'#eef8f2' },
  payment_completed:    { icon:'💳', bg:'#fef9ec' },
  follow_up_reminder:   { icon:'🐾', bg:'#e6f5f3' },
};

document.addEventListener('DOMContentLoaded', async function() {
  if (!requireAuth()) return;
  loadNotifications();
});

async function loadNotifications() {
  var el = document.getElementById('notif-list');
  try {
    var res = await Notifications.list();
    if (!res || !res.ok) { el.innerHTML = '<div style="padding:20px"><div class="alert alert-danger">Failed to load.</div></div>'; return; }
    allNotifications = res.data.notifications || [];
    var unread = res.data.unread || 0;
    document.getElementById('unread-label').textContent = unread
      ? unread + ' unread notification' + (unread !== 1 ? 's' : '')
      : 'All caught up';
    renderList();
  } catch(e) {
    el.innerHTML = '<div style="padding:20px"><div class="alert alert-danger">Something went wrong.</div></div>';
  }
}

function setFilter(el, filter) {
  currentFilter = filter;
  document.querySelectorAll('[data-filter]').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

function renderList() {
  var el = document.getElementById('notif-list');
  var list = allNotifications;

  if (currentFilter === 'unread') {
    list = list.filter(function(n){ return !n.is_read; });
  } else if (currentFilter === 'adoption') {
    list = list.filter(function(n){ return n.type && n.type.includes('adoption'); });
  } else if (currentFilter === 'payment') {
    list = list.filter(function(n){ return n.type && n.type.includes('payment'); });
  }

  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔔</div><h3>No notifications</h3><p>You\'re all caught up!</p></div>';
    return;
  }

  el.innerHTML = list.map(function(n) {
    var meta   = NOTIF_ICONS[n.type] || { icon:'🔔', bg:'#f3f3ef' };
    var isRead = n.is_read;
    return '<div class="notif-item ' + (isRead ? '' : 'unread') + '" onclick="openNotif(' + n.id + ',\'' + (n.link||'') + '\')">' +
      '<div class="notif-dot ' + (isRead ? 'read' : '') + '"></div>' +
      '<div class="notif-icon" style="background:' + meta.bg + '">' + meta.icon + '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div class="notif-title">' + (n.title||'') + '</div>' +
        (n.body ? '<div class="notif-body">' + n.body + '</div>' : '') +
        '<div class="notif-time">' + timeAgo(n.created_at) + '</div>' +
      '</div>' +
      '<button class="notif-del" onclick="event.stopPropagation();deleteNotif(' + n.id + ')" title="Delete">✕</button>' +
    '</div>';
  }).join('');
}

async function openNotif(id, link) {
  // mark as read
  var notif = allNotifications.find(function(n){ return n.id === id; });
  if (notif && !notif.is_read) {
    try {
      await Notifications.read(id);
      notif.is_read = true;
      renderList();
      // update badge
      var badge = document.getElementById('notif-badge');
      if (badge) {
        var count = Math.max(0, parseInt(badge.textContent) - 1);
        badge.textContent = count;
        badge.classList.toggle('hidden', count === 0);
      }
    } catch(e) {}
  }
  // navigate
  if (link) window.location.href = link;
}

async function markAllRead() {
  try {
    var res = await Notifications.readAll();
    if (res && res.ok) {
      allNotifications.forEach(function(n){ n.is_read = true; });
      document.getElementById('unread-label').textContent = 'All caught up';
      var badge = document.getElementById('notif-badge');
      if (badge) { badge.textContent = '0'; badge.classList.add('hidden'); }
      renderList();
      showToast('All marked as read.', 'success');
    }
  } catch(e) { showToast('Failed.', 'error'); }
}

async function deleteNotif(id) {
  try {
    var res = await Notifications.delete(id);
    if (res && res.ok) {
      allNotifications = allNotifications.filter(function(n){ return n.id !== id; });
      renderList();
    }
  } catch(e) { showToast('Failed.', 'error'); }
}

async function clearRead() {
  var readIds = allNotifications.filter(function(n){ return n.is_read; }).map(function(n){ return n.id; });
  if (!readIds.length) { showToast('No read notifications to clear.', 'info'); return; }
  if (!confirm('Delete all read notifications?')) return;
  try {
    for (var i = 0; i < readIds.length; i++) {
      await Notifications.delete(readIds[i]);
    }
    allNotifications = allNotifications.filter(function(n){ return !n.is_read; });
    renderList();
    showToast('Read notifications cleared.', 'success');
  } catch(e) { showToast('Failed.', 'error'); }
}
</script>
</body>
</html>
