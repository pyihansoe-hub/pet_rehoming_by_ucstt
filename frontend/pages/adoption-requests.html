<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adoption Requests — Pet Rehoming</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
      else if (t !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
  /* Request Cards */
.req-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 2px 4px var(--shadow-sm); transition:transform 0.2s; }
.req-card:hover { transform:translateY(-2px); box-shadow:0 4px 12px var(--shadow-md); }
.req-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
.req-user-info { display:flex; gap:12px; align-items:center; }
.req-avatar { width:44px; height:44px; border-radius:50%; background:var(--accent); color:#fff; font-size:1rem; font-weight:bold; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.req-pet-badge { background:var(--bg-muted); padding:6px 12px; border-radius:8px; font-size:0.85rem; color:var(--text-primary); font-weight:bold; }
.req-message { background:var(--bg-chat); padding:12px 16px; border-radius:8px; font-size:0.9rem; color:var(--text-secondary); line-height:1.6; margin-bottom:16px; border-left:3px solid var(--accent); }
.req-actions { display:flex; gap:10px; flex-wrap:wrap; padding-top:14px; border-top:1px solid var(--border-light); }

/* Status Highlights */
.status-pending { background:var(--warning-bg); color:var(--warning-text); padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:bold; }
.status-approved { background:var(--success-bg); color:var(--success-text); padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:bold; }
.status-rejected { background:var(--danger-bg); color:var(--danger-text); padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:bold; }
.status-cancelled { background:var(--bg-muted); color:var(--text-secondary); padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:bold; }

/* Payment Alert */
.pay-alert { background:var(--warning-bg); border:1px solid var(--warning-border); border-radius:8px; padding:14px; margin-bottom:14px; display:flex; align-items:center; gap:12px; }
.pay-alert-icon { font-size:1.5rem; }
.pay-alert-text h4 { margin:0 0 4px; color:var(--warning-text); font-size:0.9rem; }
.pay-alert-text p { margin:0; color:var(--text-secondary); font-size:0.84rem; }</style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">

    <div class="page-header">
      <h1>Adoption Requests</h1>
      <p style="color:var(--text-secondary);margin-top:4px">Manage requests you sent and requests on your pets</p>
    </div>

    <div id="tabs-wrap">
      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-mine">Sent by Me</button>
        <button class="tab-btn" data-tab="tab-received">Received</button>
      </div>

      <!-- SENT -->
      <div class="tab-panel active" id="tab-mine">
        <div id="mine-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
      </div>

      <!-- RECEIVED -->
      <div class="tab-panel" id="tab-received">
        <div id="received-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
      </div>
    </div>

  </div>
</div>

<!-- AGREEMENT MODAL -->
<div class="modal-overlay" id="agreement-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Adoption Agreement</h3>
      <button class="modal-close" onclick="closeModal('agreement-modal')">x</button>
    </div>
    <div id="agreement-content"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('agreement-modal')">Close</button>
      <button class="btn btn-primary" id="agree-btn" onclick="signAgreement()">I Agree</button>
    </div>
  </div>
</div>

<!-- FOLLOWUP MODAL -->
<div class="modal-overlay" id="followup-modal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <h3>Submit Follow-up</h3>
      <button class="modal-close" onclick="closeModal('followup-modal')">x</button>
    </div>
    <div id="followup-alert"></div>
    <div class="form-group">
      <label>Health Status</label>
      <select id="fu-health" class="form-control">
        <option value="excellent">Excellent</option>
        <option value="good" selected>Good</option>
        <option value="fair">Fair</option>
        <option value="poor">Poor</option>
      </select>
    </div>
    <div class="form-group">
      <label>Weight (kg)</label>
      <input type="number" id="fu-weight" class="form-control" placeholder="Optional" step="0.1">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="fu-notes" class="form-control" rows="3" placeholder="How is the pet doing?"></textarea>
    </div>
    <div class="form-group">
      <label>Photo</label>
      <input type="file" id="fu-image" class="form-control" accept="image/*">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('followup-modal')">Cancel</button>
      <button class="btn btn-primary" id="fu-submit-btn" onclick="submitFollowup()">Submit</button>
    </div>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
var activeFollowupId = null;
var activeAgreementId = null;

document.addEventListener('DOMContentLoaded', function() {
  if (!requireAuth()) return;
  initTabs('tabs-wrap');

  var params = new URLSearchParams(window.location.search);
  if (params.get('tab') === 'received') {
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    document.querySelector('[data-tab="tab-received"]').classList.add('active');
    document.getElementById('tab-received').classList.add('active');
  }

  loadMine();
  loadReceived();
});

// ── SENT BY ME ────────────────────────────────────────────────
async function loadMine() {
  var el = document.getElementById('mine-list');
  try {
    var res = await Adoption.mine();
    if (!res || !res.ok) { el.innerHTML = '<div class="alert alert-danger">Failed to load.</div>'; return; }
    var reqs = res.data.requests || [];
    
    if (!reqs.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">No requests</div><h3>No requests sent</h3><p>Browse pets and submit an adoption request.</p><a href="/pages/pets.html" class="btn btn-primary" style="margin-top:12px;display:inline-block">Browse Pets</a></div>';
      return;
    }
    
    el.innerHTML = reqs.map(function(r) {
      var actions = '';
      var alertHtml = '';
      
      if (r.status === 'pending') {
        alertHtml = '<div class="pay-alert" style="background:var(--info-bg); border-color:var(--info-border)"><div class="pay-alert-text"><h4 style="color:var(--info-text)">Pending Approval</h4><p>' + (r.fee_type === 'paid' ? 'Your payment was successful. Waiting for the owner to approve your request.' : 'Waiting for the owner to approve your request.') + '</p></div></div>';
        actions += '<button onclick="cancelRequest(' + r.id + ')" class="btn btn-secondary btn-sm">Cancel Request</button>';
      } else if (r.status === 'approved') {
        alertHtml = '<div class="pay-alert" style="background:var(--success-bg); border-color:var(--success-border)"><div class="pay-alert-text"><h4 style="color:var(--success-text)">Approved!</h4><p>Your request was approved. You can now chat with the owner to arrange pickup!</p></div></div>';
        actions += '<a href="/pages/messages.html" class="btn btn-primary btn-sm">Message Owner</a>';
        actions += '<button onclick="openAgreementModal(' + r.id + ')" class="btn btn-outline btn-sm">View Agreement</button>';
        actions += '<button onclick="openFollowupModal(' + r.id + ')" class="btn btn-outline btn-sm">Submit Follow-up</button>';
      } else if (r.status === 'rejected') {
        alertHtml = '<div style="background:var(--danger-bg); border:1px solid var(--danger-border); padding:12px; border-radius:8px; font-size:0.88rem; color:var(--danger-text); margin-bottom:14px;">The owner decided not to proceed with this request at this time. ' + (r.fee_type === 'paid' ? 'Any held payments have been released.' : '') + '</div>';
      }

      return '<div class="req-card">' +
        '<div class="req-header">' +
          '<div class="req-pet-badge">' + (r.pet_name||'Pet') + (r.pet_type ? ' · ' + r.pet_type : '') + '</div>' +
          '<span class="status-' + r.status + '">' + r.status.charAt(0).toUpperCase() + r.status.slice(1) + '</span>' +
        '</div>' +
        '<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:14px;">Requested on ' + fmtDate(r.created_at) + '</div>' +
        alertHtml +
        (r.message ? '<div class="req-message">"' + r.message + '"</div>' : '') +
        '<div class="req-actions">' + actions + '</div>' +
      '</div>';
    }).join('');
  } catch(e) { el.innerHTML = '<div class="alert alert-danger">Something went wrong.</div>'; }
}

// ── RECEIVED (OWNER VIEW) ───────────────────────────────────
async function loadReceived() {
  var el = document.getElementById('received-list');
  try {
    var res = await Adoption.received();
    if (!res || !res.ok) { el.innerHTML = '<div class="alert alert-danger">Failed to load.</div>'; return; }
    var reqs = res.data.requests || [];
    
    if (!reqs.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">No requests</div><h3>No requests received</h3><p>Requests from adopters will appear here.</p></div>';
      return;
    }
    
    el.innerHTML = reqs.map(function(r) {
      var actionsHtml = '';
      var statusNote = '';
      
      if (r.status === 'pending') {
        statusNote = '<div style="margin-bottom:14px;padding:10px;background:var(--info-bg);border-radius:8px;font-size:0.86rem;color:var(--info-text);border:1px solid var(--info-border);">Waiting for your review. ' + (r.fee_type === 'paid' ? 'Adopter has already paid.' : '') + '</div>';
        actionsHtml = 
          '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">' +
            '<button onclick="reviewRequest(' + r.id + ',\'approved\')" class="btn btn-primary btn-sm" style="flex:1;justify-content:center">Approve Request</button>' +
            '<button onclick="reviewRequest(' + r.id + ',\'rejected\')" class="btn btn-danger btn-sm" style="flex:1;justify-content:center">Reject</button>' +
          '</div>' +
          '<div style="font-size:0.78rem;color:var(--text-muted);text-align:center;">Approving will unlock the chat so you can message the adopter.</div>';
      } else if (r.status === 'approved') {
        statusNote = '<div style="margin-bottom:14px;padding:10px;background:var(--success-bg);border-radius:8px;font-size:0.86rem;color:var(--success-text);border:1px solid var(--success-border);">Approved. You can now chat with the adopter.</div>';
        actionsHtml = '<a href="/pages/messages.html" class="btn btn-primary btn-sm">Message Adopter</a>' +
                      '<button onclick="openAgreementModal(' + r.id + ')" class="btn btn-outline btn-sm">View Agreement</button>';
      } else if (r.status === 'rejected') {
        statusNote = '<div style="margin-bottom:14px;padding:10px;background:var(--danger-bg);border-radius:8px;font-size:0.86rem;color:var(--danger-text);border:1px solid var(--danger-border);">Rejected.</div>';
      }

      return '<div class="req-card">' +
        '<div class="req-header">' +
          '<div class="req-user-info">' +
            '<div class="req-avatar">' + initials(r.requester_name || 'U') + '</div>' +
            '<div>' +
              '<div style="font-weight:bold;font-size:0.95rem;color:var(--text-primary)">' + (r.requester_name||'User') + '</div>' +
              '<div style="font-size:0.82rem;color:var(--text-secondary);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;">' +
                (r.requester_email ? r.requester_email : '') +
                (r.requester_email && r.requester_phone ? ' · ' : '') +
                (r.requester_phone ? r.requester_phone : '') +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div style="text-align:right;">' +
            '<div class="req-pet-badge" style="margin-bottom:6px;">' + (r.pet_name||'Pet') + '</div>' +
            '<span class="status-' + r.status + '">' + r.status.charAt(0).toUpperCase() + r.status.slice(1) + '</span>' +
            '<div style="font-size:0.76rem;color:var(--text-muted);margin-top:4px;">' + timeAgo(r.created_at) + '</div>' +
          '</div>' +
        '</div>' +
        statusNote +
        (r.message ? '<div class="req-message">"' + r.message + '"</div>' : '') +
        actionsHtml +
      '</div>';
    }).join('');
  } catch(e) { el.innerHTML = '<div class="alert alert-danger">Something went wrong.</div>'; }
}

// ── ACTIONS ──────────────────────────────────────────────────
async function cancelRequest(id) {
  if (!confirm('Cancel this adoption request?')) return;
  try {
    var res = await Adoption.cancel(id);
    if (res && res.ok) { showToast('Request cancelled.', 'success'); loadMine(); }
    else showToast(res.data.message || 'Failed.', 'error');
  } catch(e) { showToast('Something went wrong.', 'error'); }
}

async function reviewRequest(id, status) {
  var label = status === 'approved' ? 'approve' : 'reject';
  if (!confirm('Are you sure you want to ' + label + ' this request?')) return;
  try {
    var res = await Adoption.review(id, { status: status });
    if (res && res.ok) {
      showToast('Request ' + status + '.', 'success');
      loadReceived();
    } else showToast(res.data.message || 'Failed.', 'error');
  } catch(e) { showToast('Something went wrong.', 'error'); }
}

// ── FOLLOWUP MODAL LOGIC ────────────────────────────────────
function openFollowupModal(requestId) {
  activeFollowupId = requestId;
  document.getElementById('fu-health').value = 'good';
  document.getElementById('fu-weight').value = '';
  document.getElementById('fu-notes').value  = '';
  document.getElementById('fu-image').value  = '';
  document.getElementById('followup-alert').innerHTML = '';
  openModal('followup-modal');
}

async function submitFollowup() {
  if (!activeFollowupId) return;
  var btn = document.getElementById('fu-submit-btn');
  var alertEl = document.getElementById('followup-alert');
  btn.disabled = true; btn.textContent = 'Submitting...';

  var fd = new FormData();
  fd.append('health_status', document.getElementById('fu-health').value);
  var w = document.getElementById('fu-weight').value;
  var n = document.getElementById('fu-notes').value.trim();
  var img = document.getElementById('fu-image').files[0];
  if (w) fd.append('weight_kg', w);
  if (n) fd.append('notes', n);
  if (img) fd.append('image', img);

  try {
    var res = await Monitoring.submitFollowup(activeFollowupId, fd);
    if (res && res.ok) {
      closeModal('followup-modal');
      showToast('Follow-up submitted. Thank you!', 'success');
    } else {
      alertEl.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'Failed.') + '</div>';
    }
  } catch(e) { alertEl.innerHTML = '<div class="alert alert-danger">Something went wrong.</div>'; }
  btn.disabled = false; btn.textContent = 'Submit';
}

// ── AGREEMENT MODAL LOGIC ────────────────────────────────────
async function openAgreementModal(requestId) {
  activeAgreementId = requestId;
  var content = document.getElementById('agreement-content');
  var agreeBtn = document.getElementById('agree-btn');
  content.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  agreeBtn.style.display = 'inline-block';
  openModal('agreement-modal');

  try {
    var res = await Adoption.getAgreement(requestId);
    if (!res || !res.ok) {
      content.innerHTML = '<div class="alert alert-info">Agreement not created yet. It will appear shortly after approval.</div>';
      agreeBtn.style.display = 'none';
      return;
    }
    var a = res.data.agreement;

    content.innerHTML =
      '<div style="background:var(--bg-chat);padding:16px;border-radius:8px;margin-bottom:20px;font-size:0.9rem;color:var(--text-secondary);line-height:1.7;border:1px solid var(--border);">' +
        (a.terms || 'By signing this agreement, both parties agree to the adoption terms. The adopter agrees to provide a safe and loving home, adequate food, water, and veterinary care. The owner agrees to accurately represent the pet\'s health and temperament.') +
      '</div>' +
      '<div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px;">' +
        '<div style="display:flex;align-items:center;gap:8px;font-size:0.9rem;padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;flex:1;">' +
          (a.owner_agreed ? 'Signed' : 'Pending') + ' <strong>Owner</strong>' +
          (a.owner_agreed_at ? '<br><span style="font-size:0.78rem;color:var(--text-muted)">Signed ' + fmtDate(a.owner_agreed_at) + '</span>' : '') +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;font-size:0.9rem;padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;flex:1;">' +
          (a.adopter_agreed ? 'Signed' : 'Pending') + ' <strong>Adopter</strong>' +
          (a.adopter_agreed_at ? '<br><span style="font-size:0.78rem;color:var(--text-muted)">Signed ' + fmtDate(a.adopter_agreed_at) + '</span>' : '') +
        '</div>' +
      '</div>' +
      (a.owner_agreed && a.adopter_agreed ? '<div class="alert alert-success">Both parties have signed. Adoption is finalised.</div>' : '');

    if (a.owner_agreed && a.adopter_agreed) agreeBtn.style.display = 'none';
  } catch(e) {
    content.innerHTML = '<div class="alert alert-danger">Failed to load agreement.</div>';
    agreeBtn.style.display = 'none';
  }
}

async function signAgreement() {
  if (!activeAgreementId) return;
  var btn = document.getElementById('agree-btn');
  btn.disabled = true; btn.textContent = 'Signing...';
  try {
    var res = await Adoption.agree(activeAgreementId);
    if (res && res.ok) {
      showToast('You signed the agreement.', 'success');
      openAgreementModal(activeAgreementId); 
    } else showToast(res.data.message || 'Failed.', 'error');
  } catch(e) { showToast('Something went wrong.', 'error'); }
  btn.disabled = false; btn.textContent = 'I Agree';
}
</script>
</body>
</html>
