<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:460px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:2.5rem;margin-bottom:8px"></div>
        <h1 style="font-size:1.5rem;margin-bottom:6px">Create an account</h1>
        <p style="color:#6b7a8d;font-size:0.9rem">Join to adopt or rehome pets</p>
      </div>

      <div class="card">
        <div id="alert-area"></div>

        <div class="form-group">
          <label for="name">Full Name <span style="color:#e76f51">*</span></label>
          <input type="text" id="name" class="form-control" placeholder="Your full name">
        </div>

        <div class="form-group">
          <label for="email">Email <span style="color:#e76f51">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password <span style="color:#e76f51">*</span></label>
            <input type="password" id="password" class="form-control" placeholder="Min 6 characters">
          </div>
          <div class="form-group">
            <label for="confirm">Confirm Password <span style="color:#e76f51">*</span></label>
            <input type="password" id="confirm" class="form-control" placeholder="Repeat password">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" class="form-control" placeholder="+95 9...">
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" class="form-control" placeholder="City, Township">
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="register-btn" onclick="doRegister()">Create Account</button>

        <hr class="divider">
        <p style="text-align:center;font-size:0.86rem;color:#6b7a8d">
          Already have an account? <a href="/pages/login.html">Log in</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="/../js/app.js"></script>
<script>
if (getToken()) window.location.href = '/index.html';

async function doRegister() {
  var name     = document.getElementById('name').value.trim();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var confirm  = document.getElementById('confirm').value;
  var phone    = document.getElementById('phone').value.trim();
  var address  = document.getElementById('address').value.trim();
  var alertArea = document.getElementById('alert-area');
  var btn = document.getElementById('register-btn');

  alertArea.innerHTML = '';

  if (!name || !email || !password) {
    alertArea.innerHTML = '<div class="alert alert-danger">Name, email, and password are required.</div>';
    return;
  }
  if (password.length < 6) {
    alertArea.innerHTML = '<div class="alert alert-danger">Password must be at least 6 characters.</div>';
    return;
  }
  if (password !== confirm) {
    alertArea.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    var body = { name: name, email: email, password: password };
    if (phone)   body.phone   = phone;
    if (address) body.address = address;

    var res = await Auth.register(body);
    if (res && res.ok) {
      saveAuth(res.data.token, res.data.user);
      showToast('Welcome, ' + res.data.user.name + '!', 'success');
      setTimeout(function() { window.location.href = '/index.html'; }, 600);
    } else {
      alertArea.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'Registration failed.') + '</div>';
    }
  } catch(e) {
    alertArea.innerHTML = '<div class="alert alert-danger">Something went wrong. Try again.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Create Account';
}
</script>
</body>
</html>
