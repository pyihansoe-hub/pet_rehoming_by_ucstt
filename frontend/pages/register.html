<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:520px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        <h1 style="font-size:1.5rem;margin-bottom:6px">Create an account</h1>
        <p style="color:#6b7a8d;font-size:0.9rem">Join to adopt or rehome pets</p>
      </div>

      <div class="card">
        <div id="alert-area"></div>

        <!-- Account -->
        <div class="form-group">
          <label for="name">Full Name <span style="color:#e76f51">*</span></label>
          <input type="text" id="name" class="form-control" placeholder="Your full name">
        </div>

        <div class="form-group">
          <label for="email">Email <span style="color:#e76f51">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com">
          <small style="color:#6b7a8d">We'll send a verification link to this email.</small>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password <span style="color:#e76f51">*</span></label>
            <input type="password" id="password" class="form-control" placeholder="Min 6 characters">
          </div>
          <div class="form-group">
            <label for="confirm">Confirm <span style="color:#e76f51">*</span></label>
            <input type="password" id="confirm" class="form-control" placeholder="Repeat password">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone <span style="color:#e76f51">*</span></label>
            <input type="text" id="phone" class="form-control" placeholder="+95 9...">
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" class="form-control" placeholder="City, Township">
          </div>
        </div>

        <hr class="divider">
        <h3 style="font-size:1.05rem;margin-bottom:10px">Payment Method</h3>
        <p style="color:#6b7a8d;font-size:0.82rem;margin-bottom:12px">
          Used for adoption fees &amp; refunds. Your card details are stored securely (last 4 digits only).
        </p>

        <div class="form-group">
          <label for="payment_method">Method <span style="color:#e76f51">*</span></label>
          <select id="payment_method" class="form-control" onchange="togglePaymentFields()">
            <option value="">— Select —</option>
            <option value="credit_card">Credit / Debit Card</option>
            <option value="ayapay">AyaPay</option>
            <option value="wavepay">Wave Pay</option>
            <option value="kpay">KBZ Pay</option>
          </select>
        </div>

        <!-- Credit card fields -->
        <div id="cc-fields" style="display:none">
          <div class="form-group">
            <label for="cc_name">Cardholder Name <span style="color:#e76f51">*</span></label>
            <input type="text" id="cc_name" class="form-control" placeholder="Name on card">
          </div>
          <div class="form-group">
            <label for="cc_number">Card Number <span style="color:#e76f51">*</span></label>
            <input type="text" id="cc_number" class="form-control" placeholder="0000 0000 0000 0000"
                   maxlength="19" inputmode="numeric" oninput="formatCard(this)">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cc_expiry">Expiry (MM/YY) <span style="color:#e76f51">*</span></label>
              <input type="text" id="cc_expiry" class="form-control" placeholder="MM/YY"
                     maxlength="5" oninput="formatExpiry(this)">
            </div>
            <div class="form-group">
              <label for="cc_cvc">CVC <span style="color:#e76f51">*</span></label>
              <input type="password" id="cc_cvc" class="form-control" placeholder="123"
                     maxlength="4" inputmode="numeric">
            </div>
          </div>
          <div class="form-group">
            <label for="cc_billing">Billing Address</label>
            <input type="text" id="cc_billing" class="form-control" placeholder="Street, City">
          </div>
        </div>

        <!-- Wallet fields -->
        <div id="wallet-fields" style="display:none">
          <div class="form-group">
            <label for="wallet_name">Account Holder Name <span style="color:#e76f51">*</span></label>
            <input type="text" id="wallet_name" class="form-control" placeholder="Name registered with wallet">
            <small style="color:#6b7a8d">We will use your main Phone number above for this wallet.</small>
          </div>
        </div>

        <button type="button" class="btn btn-primary btn-full" id="register-btn" onclick="doRegister()">Create Account</button>

        <hr class="divider">
        <p style="text-align:center;font-size:0.86rem;color:#6b7a8d">
          Already have an account? <a href="/pages/login.html">Log in</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
if (getToken()) window.location.href = '/index.html';

function togglePaymentFields() {
  var method = document.getElementById('payment_method').value;
  document.getElementById('cc-fields').style.display     = method === 'credit_card' ? 'block' : 'none';
  document.getElementById('wallet-fields').style.display = ['ayapay','wavepay','kpay'].includes(method) ? 'block' : 'none';
}

function formatCard(el) {
  var v = el.value.replace(/\D/g,'').slice(0,16);
  el.value = v.replace(/(.{4})/g,'$1 ').trim();
}
function formatExpiry(el) {
  var v = el.value.replace(/\D/g,'').slice(0,4);
  if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
  el.value = v;
}

function detectBrand(num) {
  num = num.replace(/\s/g,'');
  if (/^4/.test(num)) return 'visa';
  if (/^5[1-5]/.test(num)) return 'mastercard';
  if (/^3[47]/.test(num)) return 'amex';
  if (/^6(?:011|5)/.test(num)) return 'discover';
  if (/^62/.test(num)) return 'unionpay';
  if (/^35/.test(num)) return 'jcb';
  return 'unknown';
}

async function doRegister(event) {
  if (event) event.preventDefault(); 
  var name     = document.getElementById('name').value.trim();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var confirm  = document.getElementById('confirm').value;
  var phone    = document.getElementById('phone').value.trim();
  var address  = document.getElementById('address').value.trim();
  var method   = document.getElementById('payment_method').value;
  var alertArea = document.getElementById('alert-area');
  var btn = document.getElementById('register-btn');

  alertArea.innerHTML = '';

  if (!name || !email || !password) {
    alertArea.innerHTML = '<div class="alert alert-danger">Name, email, and password are required.</div>';
    return;
  }
  if (password.length < 6) {
    alertArea.innerHTML = '<div class="alert alert-danger">Password must be at least 6 characters.</div>';
    return;
  }
  if (password !== confirm) {
    alertArea.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
    return;
  }
  if (!method) {
    alertArea.innerHTML = '<div class="alert alert-danger">Please choose a payment method.</div>';
    return;
  }

  var payment = { method_type: method };

  if (method === 'credit_card') {
    var ccName   = document.getElementById('cc_name').value.trim();
    var ccNumber = document.getElementById('cc_number').value.replace(/\s/g,'');
    var ccExp    = document.getElementById('cc_expiry').value.trim();
    var ccCvc    = document.getElementById('cc_cvc').value;
    var ccBill   = document.getElementById('cc_billing').value.trim();

    if (!ccName || !ccNumber || !ccExp || !ccCvc) {
      alertArea.innerHTML = '<div class="alert alert-danger">Please complete all card fields.</div>';
      return;
    }
    if (ccNumber.length < 13 || ccNumber.length > 16) {
      alertArea.innerHTML = '<div class="alert alert-danger">Invalid card number length.</div>';
      return;
    }
    if (!/^\d{2}\/\d{2}$/.test(ccExp)) {
      alertArea.innerHTML = '<div class="alert alert-danger">Expiry must be MM/YY.</div>';
      return;
    }
    if (ccCvc.length < 3) {
      alertArea.innerHTML = '<div class="alert alert-danger">Invalid CVC.</div>';
      return;
    }
    var parts = ccExp.split('/');
    payment.card_holder_name   = ccName;
    payment.card_last_four     = ccNumber.slice(-4);
    payment.card_brand         = detectBrand(ccNumber);
    payment.card_expiry_month  = parseInt(parts[0],10);
    payment.card_expiry_year   = 2000 + parseInt(parts[1],10);
    payment.billing_address    = ccBill || null;
  } else {
    var wName  = document.getElementById('wallet_name').value.trim();
    if (!phone) {
      alertArea.innerHTML = '<div class="alert alert-danger">Phone number is required for wallet payments.</div>';
      return;
    }
    if (!wName) {
      alertArea.innerHTML = '<div class="alert alert-danger">Wallet account holder name is required.</div>';
      return;
    }
    // Map the top-level phone number to the wallet phone
    payment.wallet_phone        = phone;
    payment.wallet_account_name = wName;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    var body = { name: name, email: email, password: password, payment_method: payment };
    if (phone)   body.phone   = phone;
    if (address) body.address = address;

    var res = await Auth.register(body);

    if (res && res.ok && res.data && res.data.token) {
      saveAuth(res.data.token, res.data.user);
      showToast('Welcome, ' + res.data.user.name + '!', 'success');
      setTimeout(function() { 
        window.location.href = '/index.html'; 
      }, 600);
    } else {
      var errMsg = (res && res.data && res.data.message) ? res.data.message : 'Registration failed.';
      alertArea.innerHTML = '<div class="alert alert-danger">' + errMsg + '</div>';
    }
  } catch(e) {
    alertArea.innerHTML = '<div class="alert alert-danger">Something went wrong. Try again.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Create Account';
}
</script>
</body>
</html>
