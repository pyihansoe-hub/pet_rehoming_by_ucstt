<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PetLink</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="logo">🐾 PetLink</a>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="pets.html">Pets</a></li>
                <li class="guest-only"><a href="login.html">Login</a></li>
                <li class="guest-only"><a href="register.html" class="active">Register</a></li>
            </ul>
        </div>
    </nav>

    <main class="section">
        <div class="form-container">
            <h2 class="form-title">Create Account</h2>
            <div id="message"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required minlength="6" placeholder="Min 6 characters">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
            <p class="text-center mt-20">
                Already have an account? <a href="login.html" style="color: #4CAF50;">Login here</a>
            </p>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');
            
            messageEl.innerHTML = '<div class="loading">Creating account...</div>';
            
            const result = await register(name, email, password);
            
            if (result.success) {
                messageEl.innerHTML = '<div class="success-message">Registration successful! Redirecting...</div>';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                messageEl.innerHTML = `<div class="error-message">${result.message}</div>`;
            }
        });
    </script>
</body>
</html>
