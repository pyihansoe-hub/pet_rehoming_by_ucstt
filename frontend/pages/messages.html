<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .msg-wrap { display:grid; grid-template-columns:280px 1fr; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; background:#fff; height:calc(100vh - 120px); }
    .msg-sidebar { border-right:1px solid #e5e7eb; display:flex; flex-direction:column; background:#f9f9f7; }
    .msg-sidebar-header { padding:14px 16px; border-bottom:1px solid #e5e7eb; background:#fff; display:flex; align-items:center; justify-content:space-between; }
    .conv-list { flex:1; overflow-y:auto; }
    .conv-item { padding:13px 16px; border-bottom:1px solid #e5e7eb; cursor:pointer; transition:background 0.1s; }
    .conv-item:hover { background:#e6f5f3; }
    .conv-item.active { background:#e6f5f3; border-left:3px solid #2a9d8f; }
    .conv-item.unread .conv-name { font-weight:bold; color:#1c2b3a; }
    .conv-name { font-size:0.86rem; font-weight:500; color:#1c2b3a; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-pet { font-size:0.76rem; color:#2a9d8f; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-preview { font-size:0.76rem; color:#9baab8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
    .conv-time { font-size:0.72rem; color:#9baab8; flex-shrink:0; }
    .unread-dot { width:8px; height:8px; border-radius:50%; background:#2a9d8f; flex-shrink:0; }
    .msg-main { display:flex; flex-direction:column; }
    .msg-header { padding:13px 18px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:10px; }
    .msg-messages { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
    .msg-bubble-wrap { display:flex; gap:8px; max-width:75%; }
    .msg-bubble-wrap.me { align-self:flex-end; flex-direction:row-reverse; }
    .msg-bubble { padding:9px 14px; border-radius:16px; font-size:0.88rem; line-height:1.5; word-break:break-word; }
    .msg-bubble-wrap.other .msg-bubble { background:#f3f3ef; color:#1c2b3a; border-bottom-left-radius:4px; }
    .msg-bubble-wrap.me    .msg-bubble { background:#2a9d8f; color:#fff; border-bottom-right-radius:4px; }
    .msg-time { font-size:0.7rem; color:#9baab8; margin-top:3px; }
    .msg-bubble-wrap.me .msg-time { text-align:right; }
    .msg-avatar { width:30px; height:30px; border-radius:50%; background:#e6f5f3; color:#2a9d8f; font-size:0.72rem; font-weight:bold; display:flex; align-items:center; justify-content:center; flex-shrink:0; align-self:flex-end; }
    .msg-input-area { padding:13px 18px; border-top:1px solid #e5e7eb; display:flex; gap:8px; align-items:flex-end; }
    .msg-input { flex:1; padding:9px 14px; border:1.5px solid #e5e7eb; border-radius:20px; font-size:0.88rem; font-family:Arial,sans-serif; outline:none; resize:none; line-height:1.4; max-height:100px; overflow-y:auto; }
    .msg-input:focus { border-color:#2a9d8f; }
    .msg-send { width:38px; height:38px; border-radius:50%; background:#2a9d8f; color:#fff; border:none; font-size:1rem; cursor:pointer; flex-shrink:0; }
    .msg-send:hover { background:#21867a; }
    .msg-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:#9baab8; text-align:center; padding:40px; }
    .msg-date-divider { text-align:center; font-size:0.74rem; color:#9baab8; margin:8px 0; position:relative; }
    .msg-date-divider::before, .msg-date-divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:#e5e7eb; }
    .msg-date-divider::before { left:0; }
    .msg-date-divider::after { right:0; }
    @media(max-width:700px){ .msg-wrap{ grid-template-columns:1fr; } .msg-sidebar{ display:none; } .msg-sidebar.show{ display:flex; } }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap" style="padding-bottom:0">
  <div class="container">

    <div class="page-header-row" style="margin-bottom:16px">
      <h1>Messages</h1>
      <span id="unread-msg-count" style="font-size:0.86rem;color:#6b7a8d"></span>
    </div>

    <div class="msg-wrap">

      <!-- SIDEBAR -->
      <div class="msg-sidebar">
        <div class="msg-sidebar-header">
          <span style="font-size:0.92rem;font-weight:bold">Conversations</span>
        </div>
        <div class="conv-list" id="conv-list">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- MAIN -->
      <div class="msg-main">
        <div id="msg-header-area" class="msg-header" style="display:none">
          <div style="width:36px;height:36px;border-radius:50%;background:#e6f5f3;display:flex;align-items:center;justify-content:center;font-size:1.1rem">🐾</div>
          <div>
            <div id="msg-header-name" style="font-weight:bold;font-size:0.92rem"></div>
            <div id="msg-header-pet" style="font-size:0.78rem;color:#6b7a8d"></div>
          </div>
        </div>

        <div id="msg-messages-area" class="msg-messages">
          <div class="msg-empty">
            <div style="font-size:2.5rem;margin-bottom:12px">💬</div>
            <div style="font-weight:bold;margin-bottom:6px">No conversation selected</div>
            <div style="font-size:0.86rem">Select a conversation from the left to start messaging.</div>
          </div>
        </div>

        <div class="msg-input-area" id="msg-input-area" style="display:none">
          <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1"
            onkeydown="handleMsgKey(event)" oninput="autoResize(this)"></textarea>
          <button class="msg-send" onclick="sendMessage()" title="Send">➤</button>
        </div>
      </div>

    </div>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var activeConvId   = null;
var activeConvData = null;
var currentUserId  = null;
var pollTimer      = null;

document.addEventListener('DOMContentLoaded', async function() {
  if (!requireAuth()) return;
  var u = getUser();
  currentUserId = u ? u.id : null;
  loadConversations();
});

async function loadConversations() {
  var el = document.getElementById('conv-list');
  try {
    var res = await Messages.conversations();
    if (!res || !res.ok) {
      el.innerHTML = '<div style="padding:16px;font-size:0.84rem;color:#e76f51">Failed to load conversations.</div>';
      return;
    }
    var convs = res.data.conversations || [];

    // update unread count label
    var totalUnread = convs.reduce(function(sum, c){ return sum + (+c.unread_count || 0); }, 0);
    var unreadEl = document.getElementById('unread-msg-count');
    if (unreadEl) unreadEl.textContent = totalUnread ? totalUnread + ' unread' : '';

    if (!convs.length) {
      el.innerHTML = '<div style="padding:24px 16px;text-align:center;font-size:0.84rem;color:#9baab8">' +
        '<div style="font-size:2rem;margin-bottom:8px">💬</div>' +
        'No conversations yet.<br>Conversations appear after an adoption request is approved.' +
      '</div>';
      return;
    }

    var u = getUser();
    el.innerHTML = convs.map(function(c) {
      // figure out the other person's name
      var isOwner  = u && c.owner_name !== u.name;
      var otherName = isOwner ? c.owner_name : c.adopter_name;
      var hasUnread = +c.unread_count > 0;
      return '<div class="conv-item' + (c.id === activeConvId ? ' active' : '') + (hasUnread ? ' unread' : '') + '" onclick="openConversation(' + c.id + ',this)">' +
        '<div class="conv-meta">' +
          '<div class="conv-name">' + (otherName || 'User') + '</div>' +
          '<div style="display:flex;align-items:center;gap:6px">' +
            '<span class="conv-time">' + (c.last_message_at ? timeAgo(c.last_message_at) : '') + '</span>' +
            (hasUnread ? '<div class="unread-dot"></div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="conv-pet">🐾 ' + (c.pet_name || '') + '</div>' +
        '<div class="conv-preview">' + (c.last_message || 'No messages yet') + '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div style="padding:16px;font-size:0.84rem;color:#e76f51">Something went wrong.</div>';
  }
}

async function openConversation(convId, el) {
  activeConvId = convId;
  if (pollTimer) clearInterval(pollTimer);

  // mark active in sidebar
  document.querySelectorAll('.conv-item').forEach(function(c){ c.classList.remove('active'); });
  if (el) el.classList.add('active');

  document.getElementById('msg-header-area').style.display  = 'flex';
  document.getElementById('msg-input-area').style.display   = 'flex';

  // find conv data from sidebar
  var convs = document.querySelectorAll('.conv-item');

  loadMessages(convId);

  // poll every 5 seconds for new messages
  pollTimer = setInterval(function(){
    if (activeConvId === convId) silentRefresh(convId);
  }, 5000);
}

async function loadMessages(convId) {
  var area = document.getElementById('msg-messages-area');
  area.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  try {
    var res = await Messages.getMessages(convId);
    if (!res || !res.ok) {
      area.innerHTML = '<div style="padding:16px;color:#e76f51">Failed to load messages.</div>';
      return;
    }
    var msgs = res.data.messages || [];

    // update header — get conv info from conversations list
    var convRes = await Messages.conversations();
    if (convRes && convRes.ok) {
      var conv = (convRes.data.conversations || []).find(function(c){ return c.id === convId; });
      if (conv) {
        var u = getUser();
        var otherName = (u && conv.adopter_name !== u.name) ? conv.adopter_name : conv.owner_name;
        document.getElementById('msg-header-name').textContent = otherName || 'User';
        document.getElementById('msg-header-pet').textContent  = '🐾 ' + (conv.pet_name || '');
      }
      loadConversations(); // refresh sidebar unread counts
    }

    renderMessages(msgs);
  } catch(e) {
    area.innerHTML = '<div style="padding:16px;color:#e76f51">Something went wrong.</div>';
  }
}

async function silentRefresh(convId) {
  try {
    var res = await Messages.getMessages(convId);
    if (res && res.ok) {
      var msgs = res.data.messages || [];
      var area = document.getElementById('msg-messages-area');
      var wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;
      renderMessages(msgs);
      if (wasAtBottom) area.scrollTop = area.scrollHeight;
    }
  } catch(e) {}
}

function renderMessages(msgs) {
  var area = document.getElementById('msg-messages-area');
  if (!msgs.length) {
    area.innerHTML = '<div style="text-align:center;padding:32px;color:#9baab8;font-size:0.86rem">No messages yet. Say hello! 👋</div>';
    return;
  }

  var html = '';
  var lastDate = '';

  msgs.forEach(function(m) {
    var msgDate = new Date(m.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    if (msgDate !== lastDate) {
      html += '<div class="msg-date-divider">' + msgDate + '</div>';
      lastDate = msgDate;
    }

    var isMe = m.sender_id === currentUserId;
    html += '<div class="msg-bubble-wrap ' + (isMe ? 'me' : 'other') + '">' +
      (!isMe ? '<div class="msg-avatar">' + initials(m.sender_name || 'U') + '</div>' : '') +
      '<div>' +
        '<div class="msg-bubble">' + escapeHtml(m.content) + '</div>' +
        '<div class="msg-time">' + timeAgo(m.created_at) + '</div>' +
      '</div>' +
    '</div>';
  });

  area.innerHTML = html;
  // scroll to bottom
  area.scrollTop = area.scrollHeight;
}

function escapeHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

async function sendMessage() {
  if (!activeConvId) return;
  var input   = document.getElementById('msg-input');
  var content = input.value.trim();
  if (!content) return;

  input.value = '';
  input.style.height = 'auto';

  try {
    var res = await Messages.send(activeConvId, { content: content });
    if (res && res.ok) {
      loadMessages(activeConvId);
    } else {
      showToast(res.data.message || 'Failed to send.', 'error');
      input.value = content; // restore
    }
  } catch(e) {
    showToast('Something went wrong.', 'error');
    input.value = content;
  }
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
</body>
</html>
