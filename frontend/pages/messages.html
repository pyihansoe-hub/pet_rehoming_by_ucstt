<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>မက်ဆေ့ခ်ျများ</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .conv-item-row { display:flex; align-items:flex-start; gap:6px; }
    .conv-item-content { flex:1; min-width:0; }
    .conv-del-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:2px 4px; border-radius:4px; font-size:0.82rem; line-height:1; opacity:0; transition:opacity 0.15s, color 0.15s; flex-shrink:0; margin-top:2px; }
    .conv-item:hover .conv-del-btn { opacity:1; }
    .conv-del-btn:hover { color:#e76f51; background:rgba(231,111,81,0.1); }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.15s ease; }
    .modal-box { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:28px; max-width:420px; width:90%; text-align:center; animation:scaleIn 0.15s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .modal-box h3 { margin:0 0 8px; font-size:1.1rem; color:var(--text-primary); }
    .modal-box p { margin:0 0 22px; font-size:0.86rem; color:var(--text-muted); line-height:1.5; }
    .modal-actions { display:flex; gap:10px; justify-content:center; margin-top: 20px; }
    .modal-actions button { padding:10px 24px; border-radius:8px; border:none; font-size:0.88rem; font-weight:600; cursor:pointer; transition:background 0.15s; }
    .btn-modal-cancel { background:var(--bg-muted); color:var(--text-primary); }
    .btn-modal-cancel:hover { background:var(--border); }
    .btn-modal-danger { background:#e76f51; color:#fff; }
    .btn-modal-danger:hover { background:#d35d40; }
    .btn-modal-danger:disabled { opacity:0.5; cursor:not-allowed; }

    /* Standard Report Button Style */
    .report-header-btn {
      display:flex; align-items:center; gap:6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .report-header-btn:hover {
      background: #fff0f0;
      border-color: #e76f51;
      color: #e76f51;
    }

    .form-group { text-align: left; margin-bottom: 16px; }
    .form-label { display:block; font-size:0.84rem; font-weight:600; margin-bottom:8px; color:var(--text-primary); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--bg-input); color: var(--text-primary);
      font-size: 0.88rem; font-family: Arial, sans-serif; outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 80px; }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes scaleIn { from{transform:scale(0.95);opacity:0} to{transform:scale(1);opacity:1} }
    .msg-wrap { display:grid; grid-template-columns:280px 1fr; border:1px solid var(--border); border-radius:10px; overflow:hidden; background:var(--bg-card); height:calc(100vh - 120px); }
    .msg-sidebar { border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--bg-chat); min-height:0; }
    .msg-sidebar-header { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--bg-card); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .conv-list { flex:1; overflow-y:auto; min-height:0; }
    .conv-item { padding:13px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
    .conv-item:hover { background:var(--accent-light-bg); }
    .conv-item.active { background:var(--accent-light-bg); border-left:3px solid var(--accent); }
    .conv-item.unread .conv-name { font-weight:bold; color:var(--text-primary); }
    .conv-name { font-size:0.86rem; font-weight:500; color:var(--text-primary); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-pet { font-size:0.76rem; color:var(--accent); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-preview { font-size:0.76rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
    .conv-time { font-size:0.72rem; color:var(--text-muted); flex-shrink:0; }
    .unread-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }
    .msg-main { display:flex; flex-direction:column; min-height:0; }
    .msg-header { padding:13px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .msg-messages { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; min-height:0; overflow-anchor:none; }
    .msg-bubble-wrap { display:flex; gap:8px; max-width:75%; flex-shrink:0; }
    .msg-bubble-wrap.me { align-self:flex-end; flex-direction:row-reverse; }
    .msg-bubble { padding:9px 14px; border-radius:16px; font-size:0.88rem; line-height:1.5; word-break:break-word; }
    .msg-bubble-wrap.other .msg-bubble { background:var(--bg-muted); color:var(--text-primary); border-bottom-left-radius:4px; }
    .msg-bubble-wrap.me    .msg-bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
    .msg-time { font-size:0.7rem; color:var(--text-muted); margin-top:3px; }
    .msg-bubble-wrap.me .msg-time { text-align:right; }
    .msg-avatar { width:30px; height:30px; border-radius:50%; background:var(--accent-light-bg); color:var(--accent); font-size:0.72rem; font-weight:bold; display:flex; align-items:center; justify-content:center; flex-shrink:0; align-self:flex-end; }
    .msg-input-area { padding:13px 18px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
    .msg-input { flex:1; padding:9px 14px; border:1.5px solid var(--border); border-radius:20px; font-size:0.88rem; font-family:Arial,sans-serif; color:var(--text-primary); background:var(--bg-input); outline:none; resize:none; line-height:1.4; max-height:100px; overflow-y:auto; }
    .msg-input:focus { border-color:var(--accent); }
    .msg-send { width:38px; height:38px; border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:1rem; cursor:pointer; flex-shrink:0; }
    .msg-send:hover { background:var(--accent-hover); }
    .msg-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--text-muted); text-align:center; padding:40px; }
    .msg-date-divider { text-align:center; font-size:0.74rem; color:var(--text-muted); margin:8px 0; position:relative; flex-shrink:0; }
    .msg-date-divider::before, .msg-date-divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--border); }
    .msg-date-divider::before { left:0; }
    .msg-date-divider::after { right:0; }
    @media(max-width:700px){ .msg-wrap{ grid-template-columns:1fr; } .msg-sidebar{ display:none; } .msg-sidebar.show{ display:flex; } }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap" style="padding-bottom:0">
  <div class="container">
    <div class="page-header-row" style="margin-bottom:16px">
      <h1>မက်ဆေ့ခ်ျများ</h1>
      <span id="unread-msg-count" style="font-size:0.86rem;color:#6b7a8d"></span>
    </div>

    <div class="msg-wrap">
      <div class="msg-sidebar">
        <div class="msg-sidebar-header">
          <span style="font-size:0.92rem;font-weight:bold">စကားပြောဆိုမှုများ</span>
        </div>
        <div class="conv-list" id="conv-list">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="msg-main">
                <div id="msg-header-area" class="msg-header" style="display:none">
          <div id="msg-header-avatar" style="width:36px;height:36px;border-radius:50%;background:#e6f5f3;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:bold;color:var(--accent);overflow:hidden;flex-shrink:0;"></div>
          <div style="flex:1; min-width:0;">
            <div id="msg-header-name" style="font-weight:bold;font-size:0.92rem"></div>
            <div id="msg-header-pet" style="font-size:0.78rem;color:#6b7a8d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          </div>
          <button id="report-user-btn" class="report-header-btn" onclick="openReportUserModal()" style="display:none;">
            🚩 <span>Report</span>
          </button>
        </div>

        <div id="msg-messages-area" class="msg-messages">
          <div class="msg-empty">
            <div style="font-size:2.5rem;margin-bottom:12px">💬</div>
            <div style="font-weight:bold;margin-bottom:6px">စကားပြောဆိုမှု မရွေးချယ်ရသေးပါ</div>
            <div style="font-size:0.86rem">စာတိုပေးပို့ရန် ဘယ်ဘက်မှ စကားပြောဆိုမှုတစ်ခုကို ရွေးချယ်ပါ။</div>
          </div>
        </div>

        <div class="msg-input-area" id="msg-input-area" style="display:none">
          <textarea class="msg-input" id="msg-input" placeholder="စာတိုရိုက်ထည့်ပါ..." rows="1"
            onkeydown="handleMsgKey(event)" oninput="autoResize(this)"></textarea>
          <button class="msg-send" onclick="sendMessage()" title="ပို့ရန်">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="delete-modal"></div>
<div id="report-modal"></div>
<footer class="footer" id="footer"></footer>

<script src="../js/api.js"></script>
<script src="/../js/app.js"></script>
<script>
var activeConvId   = null;
var activeConvData = null;
var currentUserId  = null;
var activeOtherUserId = null; 
var pollTimer      = null;

document.addEventListener('DOMContentLoaded', async function() {
  if (!requireAuth()) return;
  var u = getUser();
  currentUserId = u ? u.id : null;
  loadConversations();
});

async function loadConversations() {
  var el = document.getElementById('conv-list');
  try {
    var res = await Messages.conversations();
    if (!res || !res.ok) {
      el.innerHTML = '<div style="padding:16px;font-size:0.84rem;color:#e76f51">စကားပြောဆိုမှုများ ဖွင့်၍မရပါ။</div>';
      return;
    }
    var convs = res.data.conversations || [];

    var totalUnread = convs.reduce(function(sum, c){ return sum + (+c.unread_count || 0); }, 0);
    var unreadEl = document.getElementById('unread-msg-count');
    if (unreadEl) unreadEl.textContent = totalUnread ? totalUnread + ' မဖတ်ရသေးပါ' : '';

    if (!convs.length) {
      el.innerHTML = '<div style="padding:24px 16px;text-align:center;font-size:0.84rem;color:#9baab8">' +
        '<div style="font-size:2rem;margin-bottom:8px">💬</div>' +
        'စကားပြောဆိုမှု မရှိသေးပါ။<br>မွေးစားရန် တောင်းဆိုချက် အတည်ပြုပြီးနောက် စကားပြောဆိုမှုများ ပေါ်လာပါမည်။' +
      '</div>';
      return;
    }

    var u = getUser();
    el.innerHTML = convs.map(function(c) {
      var isOwner   = u && u.name === c.owner_name;
      var otherName = isOwner ? c.adopter_name : c.owner_name;
      var hasUnread = +c.unread_count > 0;
      
      return '<div class="conv-item' + (c.id === activeConvId ? ' active' : '') + (hasUnread ? ' unread' : '') + '" onclick="openConversation(' + c.id + ',this)">' +
        '<div class="conv-item-row">' +
          '<div class="conv-item-content">' +
            '<div class="conv-meta">' +
              '<div class="conv-name">' + (otherName || 'အသုံးပြုသူ') + '</div>' +
              '<div style="display:flex;align-items:center;gap:6px">' +
                '<span class="conv-time">' + (c.last_message_at ? timeAgo(c.last_message_at) : '') + '</span>' +
                (hasUnread ? '<div class="unread-dot"></div>' : '') +
              '</div>' +
            '</div>' +
            '<div class="conv-pet"> ' + (c.pet_name || '') + '</div>' +
            '<div class="conv-preview">' + (c.last_message || 'မက်ဆေ့ခ်ျ မရှိသေးပါ') + '</div>' +
          '</div>' +
          (isOwner ? '<button class="conv-del-btn" onclick="event.stopPropagation();showRefundModal(' + c.id + ',\'' + (c.pet_name || '').replace(/'/g, "\\'") + '\')" title="ငွေပြန်အမ်းရန်">❌</button>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div style="padding:16px;font-size:0.84rem;color:#e76f51">တစ်ခုခု မှားယွင်းသွားသည်။</div>';
  }
}

async function openConversation(convId, el) {
  activeConvId = convId;
  activeOtherUserId = null;
  
  // Clear old polling timer if it exists
  if (pollTimer) clearInterval(pollTimer);

  document.querySelectorAll('.conv-item').forEach(function(c){ c.classList.remove('active'); });
  if (el) el.classList.add('active');

  document.getElementById('msg-header-area').style.display  = 'flex';
  document.getElementById('msg-input-area').style.display   = 'flex';

  loadMessages(convId);

  // Set up polling to check for new messages every 3 seconds
  pollTimer = setInterval(function() {
    if (activeConvId === convId) {
      silentRefresh(convId);
    }
  }, 3000);
}

async function loadMessages(convId) {
  var area = document.getElementById('msg-messages-area');
  area.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  try {
    var res = await Messages.getMessages(convId);
    if (!res || !res.ok) {
      area.innerHTML = '<div style="padding:16px;color:#e76f51">မက်ဆေ့ခ်ျများ ဖွင့်၍မရပါ။</div>';
      return;
    }
    var msgs = res.data.messages || [];

    var convRes = await Messages.conversations();
    if (convRes && convRes.ok) {
      var conv = (convRes.data.conversations || []).find(function(c){ return c.id === convId; });
      if (conv) {
        var u = getUser();
        var otherName = (u && conv.adopter_name !== u.name) ? conv.adopter_name : conv.owner_name;
                document.getElementById('msg-header-name').textContent = otherName || 'အသုံးပြုသူ';
        document.getElementById('msg-header-pet').textContent  = ' ' + (conv.pet_name || '');
        
        // Set Header Avatar
        var otherAvatar = (u && conv.adopter_name !== u.name) ? conv.adopter_avatar : conv.owner_avatar;
        var headerAvatarEl = document.getElementById('msg-header-avatar');
        if (otherAvatar) {
          headerAvatarEl.innerHTML = '<img src="' + imgUrl(otherAvatar) + '" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'' + initials(otherName || 'U') + '\'">';
        } else {
          headerAvatarEl.innerHTML = '<span>' + initials(otherName || 'U') + '</span>';
        }

        // Extract other user's ID
        // We convert IDs to strings to prevent strict equality bugs (e.g., 123 vs "123")
        if (conv.adopter_id && conv.owner_id) {
          var adopterIdStr = String(conv.adopter_id);
          var ownerIdStr = String(conv.owner_id);
          var currentUserIdStr = String(currentUserId);

          if (adopterIdStr === currentUserIdStr) {
            activeOtherUserId = conv.owner_id;
          } else if (ownerIdStr === currentUserIdStr) {
            activeOtherUserId = conv.adopter_id;
          }
        }
      }
      loadConversations(); 
    }
    
    // Fallback if API doesn't provide IDs in conversation list
    if (!activeOtherUserId && msgs.length > 0) {
      var otherMsg = msgs.find(function(m){ return String(m.sender_id) !== String(currentUserId); });
      if (otherMsg) activeOtherUserId = otherMsg.sender_id;
    }

    // Show report button only if we successfully found the other user's ID
    document.getElementById('report-user-btn').style.display = activeOtherUserId ? 'flex' : 'none';

    renderMessages(msgs);
  } catch(e) {
    area.innerHTML = '<div style="padding:16px;color:#e76f51">တစ်ခုခု မှားယွင်းသွားသည်။</div>';
  }
}

async function silentRefresh(convId) {
  try {
    var res = await Messages.getMessages(convId);
    if (res && res.ok) {
      var msgs = res.data.messages || [];
      var area = document.getElementById('msg-messages-area');
      var wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;
      renderMessages(msgs, true);   // skip auto-scroll
      if (wasAtBottom) {
        requestAnimationFrame(function(){ area.scrollTop = area.scrollHeight; });
      }
    }
  } catch(e) {}
}

function renderMessages(msgs, skipScroll) {
  var area = document.getElementById('msg-messages-area');
  if (!msgs.length) {
    area.innerHTML = '<div style="text-align:center;padding:32px;color:#9baab8;font-size:0.86rem">မက်ဆေ့ခ်ျ မရှိသေးပါ။ စကားစပြောပါ။ 👋</div>';
    return;
  }

  var html = '';
  var lastDate = '';

  msgs.forEach(function(m) {
    var msgDate = new Date(m.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    if (msgDate !== lastDate) {
      html += '<div class="msg-date-divider">' + msgDate + '</div>';
      lastDate = msgDate;
    }
    
    var isMe = String(m.sender_id) === String(currentUserId);
    
    var avatarHtml = '';
    if (!isMe) {
      avatarHtml = '<div class="msg-avatar" style="overflow:hidden;padding:0;position:relative;background:var(--accent-light-bg);color:var(--accent);">' +
        '<span style="position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">' + initials(m.sender_name || 'U') + '</span>' +
        '<img src="' + imgUrl(m.sender_avatar) + '" style="position:relative;width:100%;height:100%;object-fit:cover;display:block;" alt="avatar" onerror="this.style.display=\'none\';">' +
      '</div>';
    }
    
    html += '<div class="msg-bubble-wrap ' + (isMe ? 'me' : 'other') + '">' +
      avatarHtml +
      '<div>' +
        '<div class="msg-bubble">' + escapeHtml(m.content) + '</div>' +
        '<div class="msg-time">' + timeAgo(m.created_at) + '</div>' +
      '</div>' +
    '</div>';
  });

  area.innerHTML = html;

  if (!skipScroll) {
    requestAnimationFrame(function() {
      area.scrollTop = area.scrollHeight;
    });
  }
}

async function sendMessage() {
  if (!activeConvId) return;
  var input   = document.getElementById('msg-input');
  var content = input.value.trim();
  if (!content) return;

  input.value = '';
  input.style.height = 'auto';

  try {
    var res = await Messages.send(activeConvId, { content: content });
    if (res && res.ok) {
      loadMessages(activeConvId);
    } else {
      showToast(res.data.message || 'ပို့၍မရပါ။', 'error');
      input.value = content; 
    }
  } catch(e) {
    showToast('တစ်ခုခု မှားယွင်းသွားသည်။', 'error');
    input.value = content;
  }
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function showRefundModal(convId, petName) {
  var modal = document.getElementById('delete-modal');
  modal.innerHTML =
    '<div class="modal-overlay" onclick="closeRefundModal(event)">' +
      '<div class="modal-box" style="max-width: 420px; text-align: left;" onclick="event.stopPropagation()">' +
        '<h3 style="text-align:center; margin-bottom: 12px;">ငွေပြန်အမ်းခြင်း (Refund)</h3>' +
        '<p style="text-align:center;"><strong>' + escapeHtml(petName || 'ဤအိမ်မွေးတိရစ္ဆာန်') + '</strong> အတွက် ငွေပြန်အမ်းပြီး မွေးစားခြင်းကို ငြင်းပယ်ရန် သေချာပါသလား။</p>' +
        '<div style="margin: 15px 0;">' +
          '<div style="margin-bottom: 8px; font-weight: bold; font-size: 0.88rem; color: var(--text-primary);">အိမ်မွေးတိရစ္ဆာန်ကို မည်သို့ လုပ်ဆောင်မည်နည်း။</div>' +
          '<label style="display:flex; align-items:center; gap:10px; padding:12px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; margin-bottom:8px;">' +
            '<input type="radio" name="refund_choice" value="available" checked style="transform: scale(1.1);"> ' +
            '<div>' +
              '<div style="font-size:0.88rem; font-weight:500;">ပြန်လည် ရရှိနိုင်စေရန် (Available)</div>' +
              '<small style="font-size:0.76rem; color:var(--text-muted);">အခြားသူများ မွေးစားနိုင်ရန် ပြန်လည် ဖော်ပြပါမည်။</small>' +
            '</div>' +
          '</label>' +
          '<label style="display:flex; align-items:center; gap:10px; padding:12px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer;">' +
            '<input type="radio" name="refund_choice" value="withdrawn" style="transform: scale(1.1);"> ' +
            '<div>' +
              '<div style="font-size:0.88rem; font-weight:500;">စာရင်းမှ ဖျက်သိမ်းမည် (Withdrawn)</div>' +
              '<small style="font-size:0.76rem; color:var(--text-muted);">စာရင်းမှ ထားတော့မည် မဟုတ်ပါ။</small>' +
            '</div>' +
          '</label>' +
        '</div>' +
        '<div class="modal-actions" style="margin-top: 20px;">' +
          '<button class="btn-modal-cancel" onclick="closeRefundModal()">မလုပ်တော့ပါ</button>' +
          '<button class="btn-modal-danger" id="confirm-refund-btn" onclick="confirmRefund(' + convId + ')">ငွေပြန်အမ်းရန်</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function closeRefundModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('delete-modal').innerHTML = '';
}

async function confirmRefund(convId) {
  var btn = document.getElementById('confirm-refund-btn');
  var choice = document.querySelector('input[name="refund_choice"]:checked').value;
  
  btn.disabled = true;
  btn.textContent = 'ငွေပြန်အမ်းနေသည်...';

  try {
    var res = await Messages.declineAndRefund(convId, { pet_status_choice: choice });

    if (res && res.ok) {
      closeRefundModal();
      if (activeConvId === convId) {
        loadMessages(convId); 
      }
      loadConversations();
      showToast('ငွေပြန်အမ်းခြင်း ပြီးမြောက်ပါသည်။', 'success');
    } else {
      showToast(res.data.message || 'ငွေပြန်အမ်၍မရပါ။', 'error');
      btn.disabled = false;
      btn.textContent = 'ငွေပြန်အမ်းရန်';
    }
  } catch (e) {
    console.error('Refund error:', e);
    showToast('အမှား: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'ငွေပြန်အမ်းရန်';
  }
}

// ==========================================
// REPORT USER MODAL FUNCTIONS
// ==========================================
function openReportUserModal() {
  if (!activeOtherUserId) return;
  var modal = document.getElementById('report-modal');
  modal.innerHTML =
    '<div class="modal-overlay" onclick="closeReportModal(event)">' +
      '<div class="modal-box" style="max-width: 450px; text-align: left;" onclick="event.stopPropagation()">' +
        '<h3 style="text-align:center;">အသုံးပြုသူကို တိုင်ကြားရန်</h3>' +
        '<p style="text-align:center;">တိုင်ကြားလိုသော အကြောင်းအရာကို ရွေးချယ်ပြီး အသေးစိတ် ဖြည့်စွက်ပါ။</p>' +
        
        '<div class="form-group">' +
          '<label class="form-label">အကြောင်းရင်း (Reason)</label>' +
          '<select id="report-reason" class="form-select">' +
            '<option value="harassment">နှောင့်ယှက်ခြင်း (Harassment)</option>' +
            '<option value="spam">စပမ်းပို့ခြင်း (Spam)</option>' +
            '<option value="abuse">ဆဲရေးခြင်း/ရိုင်းစိုင်းခြင်း (Abuse)</option>' +
            '<option value="misleading">လိမ်လည်ခြင်း (Misleading)</option>' +
            '<option value="inappropriate">မသင့်တော်သော အကြောင်းအရာ (Inappropriate)</option>' +
            '<option value="other">အခြား (Other)</option>' +
          '</select>' +
        '</div>' +

        '<div class="form-group">' +
          '<label class="form-label">အသေးစိတ် (Details)</label>' +
          '<textarea id="report-details" class="form-textarea" placeholder="အကြောင်းအရာကို အသေးစိတ် ရေးပါ..."></textarea>' +
        '</div>' +

        '<div class="modal-actions">' +
          '<button class="btn-modal-cancel" onclick="closeReportModal()">မလုပ်တော့ပါ</button>' +
          '<button class="btn-modal-danger" id="submit-report-btn" onclick="submitReportUser()">တိုင်ကြားရန်</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function closeReportModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('report-modal').innerHTML = '';
}

async function submitReportUser() {
  var btn = document.getElementById('submit-report-btn');
  var reason = document.getElementById('report-reason').value;
  var details = document.getElementById('report-details').value.trim();

  btn.disabled = true;
  btn.textContent = 'တိုင်ကြားနေသည်...';

  try {
    var res = await Reports.submit({ reported_user_id: activeOtherUserId, reason: reason, details: details });
    
    if (res && res.ok) {
      closeReportModal();
      showToast('တိုင်ကြားချက်ကို ပို့ပြီးပါပြီ။ ကျွန်တော်တို့ စစ်ဆေးပေးပါမည်။', 'success');
    } else {
      showToast(res.data.message || 'တိုင်ကြား၍မရပါ။', 'error');
      btn.disabled = false;
      btn.textContent = 'တိုင်ကြားရန်';
    }
  } catch (e) {
    showToast('တစ်ခုခု မှားယွင်းသွားသည်။', 'error');
    btn.disabled = false;
    btn.textContent = 'တိုင်ကြားရန်';
  }
}
</script>
