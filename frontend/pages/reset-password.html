<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:420px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:2.5rem;margin-bottom:8px">🔒</div>
        <h1 style="font-size:1.5rem;margin-bottom:6px">Set New Password</h1>
      </div>

      <div class="card" id="main-card">

        <!-- checking token -->
        <div id="checking-area" style="text-align:center;padding:20px 0">
          <div class="spinner" style="margin:0 auto 12px"></div>
          <p style="color:#6b7a8d">Verifying your link...</p>
        </div>

        <!-- invalid token -->
        <div id="invalid-area" class="hidden">
          <div class="alert alert-danger">This reset link is invalid or has expired.</div>
          <a href="/pages/forgot-password.html" class="btn btn-primary btn-full" style="margin-top:8px">Request a new link</a>
        </div>

        <!-- reset form -->
        <div id="form-area" class="hidden">
          <div id="alert-area"></div>
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" class="form-control" placeholder="Min 6 characters">
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="Repeat new password">
          </div>
          <button class="btn btn-primary btn-full" id="submit-btn" onclick="doReset()">Reset Password</button>
        </div>

        <!-- success -->
        <div id="success-area" class="hidden">
          <div class="alert alert-success">✅ Password reset successfully!</div>
          <a href="/pages/login.html" class="btn btn-primary btn-full" style="margin-top:8px">Go to Login</a>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="/../js/app.js"></script>
<script>
var resetToken = null;

document.addEventListener('DOMContentLoaded', async function() {
  var params = new URLSearchParams(window.location.search);
  resetToken = params.get('token');

  if (!resetToken) {
    show('invalid-area');
    return;
  }

  try {
    var res = await Auth.verifyResetToken(resetToken);
    if (res && res.ok && res.data.valid) {
      show('form-area');
    } else {
      show('invalid-area');
    }
  } catch(e) {
    show('invalid-area');
  }
});

function show(id) {
  document.getElementById('checking-area').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

async function doReset() {
  var newPassword  = document.getElementById('new-password').value;
  var confirm      = document.getElementById('confirm-password').value;
  var alertArea    = document.getElementById('alert-area');
  var btn          = document.getElementById('submit-btn');

  alertArea.innerHTML = '';

  if (!newPassword || newPassword.length < 6) {
    alertArea.innerHTML = '<div class="alert alert-danger">Password must be at least 6 characters.</div>';
    return;
  }
  if (newPassword !== confirm) {
    alertArea.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resetting...';

  try {
    var res = await Auth.resetPassword({ token: resetToken, newPassword: newPassword });
    if (res && res.ok) {
      document.getElementById('form-area').classList.add('hidden');
      document.getElementById('success-area').classList.remove('hidden');
    } else {
      alertArea.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'Reset failed.') + '</div>';
    }
  } catch(e) {
    alertArea.innerHTML = '<div class="alert alert-danger">Something went wrong.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Reset Password';
}
</script>
</body>
</html>
