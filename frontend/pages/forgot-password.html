<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:420px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:2.5rem;margin-bottom:8px">🔐</div>
        <h1 style="font-size:1.5rem;margin-bottom:6px">Reset Password</h1>
        <p style="color:#6b7a8d;font-size:0.9rem" id="subtitle">Enter your email to begin</p>
      </div>

      <div class="card">
        <div id="alert-area"></div>

        <!-- Step 1: Email -->
        <div id="form-area">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com">
          </div>
          <button class="btn btn-primary btn-full" id="submit-btn" onclick="doForgot()">Continue</button>
        </div>

        <!-- Step 2: 2FA verification -->
        <div id="twofa-area" class="hidden">
          <div class="alert alert-info">
            Enter the 6-digit code from Google Authenticator to verify your identity.
          </div>
          <div class="form-group">
            <label for="totp-code">Authentication Code</label>
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                   id="totp-code" class="form-control" placeholder="123456"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>
          <button class="btn btn-primary btn-full" id="verify-btn" onclick="doVerify2FA()">Verify Code</button>
          <p style="text-align:center;font-size:0.86rem;color:#6b7a8d;margin-top:8px">
            <a href="#" onclick="backToEmail()">← Use a different email</a>
          </p>
        </div>

        <!-- Step 3: New Password -->
        <div id="password-area" class="hidden">
          <div class="alert alert-success">
            ✅ 2FA Verified! Please enter your new password.
          </div>
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" class="form-control" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="••••••••">
          </div>
          <button class="btn btn-primary btn-full" id="reset-btn" onclick="doResetPassword()">Reset Password</button>
        </div>

        <!-- Step 4: Success -->
        <div id="success-area" class="hidden">
          <div class="alert alert-success">
            ✅ Your password has been reset successfully!
          </div>
          <a href="/pages/login.html" class="btn btn-primary btn-full" style="margin-top:8px">Proceed to Login</a>
        </div>

        <hr class="divider">
        <p style="text-align:center;font-size:0.86rem;color:#6b7a8d">
          <a href="/pages/login.html">← Back to Login</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var currentEmail = '';
var current2FACode = '';

function showAlert(msg, type) {
  type = type || 'danger';
  document.getElementById('alert-area').innerHTML =
    '<div class="alert alert-' + type + '">' + msg + '</div>';
}
function clearAlert() {
  document.getElementById('alert-area').innerHTML = '';
}
/* Step 1 — Check if email exists and requires 2FA */
async function doForgot() {
  var email = document.getElementById('email').value.trim();
  var btn   = document.getElementById('submit-btn');

  clearAlert();
  if (!email) { showAlert('Please enter your email.'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking...';
  try {
    var res = await Auth.checkReset2FA({ email: email });

    if (res && res.ok && res.data && res.data.requires2FA) {
      // Account has 2FA — go to step 2
      currentEmail = email;
      document.getElementById('form-area').classList.add('hidden');
      document.getElementById('twofa-area').classList.remove('hidden');
      document.getElementById('subtitle').textContent = 'Enter your 2FA code';
      document.getElementById('totp-code').focus();
    } else if (res && res.ok) {
      // Account exists, but NO 2FA
      showAlert('2FA is not enabled on this account. You cannot reset your password this way.');
    } else {
      var msg = (res && res.data && res.data.message) ? res.data.message : 'Server error.';
      showAlert(msg);
    }
  } catch (e) {
    showAlert('Something went wrong. Try again.');
  }

  btn.disabled = false;
  btn.textContent = 'Continue';
}

/* Step 2 — Verify TOTP locally before allowing password change */
async function doVerify2FA() {
  var code = document.getElementById('totp-code').value.trim();
  var btn  = document.getElementById('verify-btn');

  clearAlert();
  if (!/^\d{6}$/.test(code)) {
    showAlert('Please enter the 6-digit code from Google Authenticator.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verifying...';
  try {
    // We send code to backend to verify it's correct before moving to password step
    var res = await Auth.verifyReset2FA({ email: currentEmail, code: code });

    if (res && res.ok) {
      current2FACode = code; // Save code to send with the final password reset
      document.getElementById('twofa-area').classList.add('hidden');
      document.getElementById('password-area').classList.remove('hidden');
      document.getElementById('subtitle').textContent = 'Set your new password';
      document.getElementById('new-password').focus();
    } else {
      var msg = (res && res.data && res.data.message) ? res.data.message : 'Invalid or expired code.';
      showAlert(msg);
    }
  } catch (e) {
    showAlert('Something went wrong. Try again.');
  }

  btn.disabled = false;
  btn.textContent = 'Verify Code';
}

/* Step 3 — Submit new password along with email and 2FA code */
async function doResetPassword() {
  var newPass     = document.getElementById('new-password').value;
  var confirmPass = document.getElementById('confirm-password').value;
  var btn         = document.getElementById('reset-btn');

  clearAlert();
  if (!newPass || newPass.length < 6) {
    showAlert('Password must be at least 6 characters long.');
    return;
  }
  if (newPass !== confirmPass) {
    showAlert('Passwords do not match.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resetting...';
  try {
    var res = await Auth.completeReset2FA({
      email: currentEmail,
      code: current2FACode,
      newPassword: newPass
    });

    if (res && res.ok) {
      document.getElementById('password-area').classList.add('hidden');
      document.getElementById('success-area').classList.remove('hidden');
      document.getElementById('subtitle').textContent = 'Success!';
    } else {
      var msg = (res && res.data && res.data.message) ? res.data.message : 'Failed to reset password.';
      showAlert(msg);
    }
  } catch (e) {
    showAlert('Something went wrong. Try again.');
  }

  btn.disabled = false;
  btn.textContent = 'Reset Password';
}

function backToEmail() {
  clearAlert();
  document.getElementById('twofa-area').classList.add('hidden');
  document.getElementById('form-area').classList.remove('hidden');
  document.getElementById('subtitle').textContent = 'Enter your email to begin';
  document.getElementById('totp-code').value = '';
}
</script>
</body>
</html>
