<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:420px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:2.5rem;margin-bottom:8px">🔑</div>
        <h1 style="font-size:1.5rem;margin-bottom:6px">Forgot Password</h1>
        <p style="color:#6b7a8d;font-size:0.9rem">Enter your email to receive a reset link</p>
      </div>

      <div class="card">
        <div id="alert-area"></div>

        <div id="form-area">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com">
          </div>
          <button class="btn btn-primary btn-full" id="submit-btn" onclick="doForgot()">Send Reset Link</button>
        </div>

        <div id="success-area" class="hidden">
          <div class="alert alert-success">
            ✅ If that email is registered, a reset link has been sent. Check your inbox.
          </div>
          <p style="text-align:center;font-size:0.86rem;color:#6b7a8d;margin-top:8px">
            Didn't get it? Check your spam folder or <a href="#" onclick="resetForm()">try again</a>.
          </p>
        </div>

        <hr class="divider">
        <p style="text-align:center;font-size:0.86rem;color:#6b7a8d">
          <a href="/pages/login.html">← Back to Login</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
async function doForgot() {
  var email = document.getElementById('email').value.trim();
  var alertArea = document.getElementById('alert-area');
  var btn = document.getElementById('submit-btn');

  alertArea.innerHTML = '';
  if (!email) {
    alertArea.innerHTML = '<div class="alert alert-danger">Please enter your email.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    var res = await Auth.forgotPassword({ email: email });
    if (res) {
      document.getElementById('form-area').classList.add('hidden');
      document.getElementById('success-area').classList.remove('hidden');
    }
  } catch(e) {
    alertArea.innerHTML = '<div class="alert alert-danger">Something went wrong. Try again.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Send Reset Link';
}

function resetForm() {
  document.getElementById('form-area').classList.remove('hidden');
  document.getElementById('success-area').classList.add('hidden');
  document.getElementById('email').value = '';
}
</script>
</body>
</html>
