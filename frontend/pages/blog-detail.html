<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Pet Rehoming</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
      else if (t !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    .blog-content { line-height:1.85; color:var(--text-primary); font-size:0.97rem; }
    .blog-content p  { margin-bottom:16px; }
    .blog-content h2 { font-size:1.2rem; margin:24px 0 10px; color:var(--text-primary); }
    .blog-content h3 { font-size:1.05rem; margin:20px 0 8px; color:var(--text-primary); }
    .blog-content ul, .blog-content ol { margin:0 0 16px 24px; }
    .blog-content li { margin-bottom:6px; }
    .blog-content blockquote { border-left:3px solid var(--accent); padding:10px 16px; background:var(--accent-light-bg); border-radius:0 8px 8px 0; margin:16px 0; color:var(--accent-hover); font-style:italic; }
    .comment-item { padding:14px 0; border-bottom:1px solid var(--border); }
    .comment-item:last-child { border-bottom:none; }
    .comment-avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; font-size:0.78rem; font-weight:bold; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
    .comment-avatar img { width:100%; height:100%; object-fit:cover; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">

    <div id="loading-area" class="loading-wrap"><div class="spinner"></div></div>
    <div id="error-area" class="hidden">
      <div class="alert alert-danger" id="error-msg">Blog not found.</div>
      <a href="/pages/blogs.html" class="btn btn-secondary" style="margin-top:8px">Back to Blogs</a>
    </div>

    <div id="content-area" class="hidden">
      <div style="display:grid;grid-template-columns:1fr 260px;gap:32px;align-items:start">

        <!-- MAIN -->
        <div>
          <div style="margin-bottom:16px">
            <a href="/pages/blogs.html" style="font-size:0.86rem;color:var(--text-secondary)">All Blogs</a>
          </div>

          <div id="cat-label" style="font-size:0.76rem;font-weight:bold;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px"></div>
          <h1 id="blog-title" style="font-size:1.7rem;margin-bottom:12px;line-height:1.3"></h1>

          <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap">
            <div id="author-info" style="display:flex;align-items:center;gap:8px;font-size:0.86rem;color:var(--text-secondary)"></div>
            <span style="color:var(--border)">|</span>
            <span id="blog-date" style="font-size:0.84rem;color:var(--text-muted)"></span>
            <span style="color:var(--border)">|</span>
            <span id="blog-views" style="font-size:0.84rem;color:var(--text-muted)"></span>
          </div>

          <div id="cover-img-area" style="margin-bottom:24px"></div>

          <div id="blog-content" class="blog-content"></div>

          <div id="tags-area" style="margin-top:24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center"></div>

          <!-- LIKE & SHARE -->
          <div style="display:flex;align-items:center;gap:16px;margin:28px 0;padding:16px;background:var(--bg-chat);border-radius:10px;flex-wrap:wrap">
            <button id="like-btn" onclick="toggleLike()" style="display:flex; align-items:center; background:none; border:1.5px solid var(--border); padding:8px 16px; border-radius:8px; font-size:0.88rem; font-weight:bold; cursor:pointer; color:var(--text-secondary); margin-right:16px;">
              🤍 <span id="like-count" style="margin-left:6px;">0</span> Likes
            </button>
            <span style="font-size:0.84rem;color:var(--text-muted)">Found this helpful? Share with other pet owners.</span>
            <div style="display:flex;gap:8px;margin-left:auto" id="share-buttons">
              <button onclick="sharePost('twitter')" class="btn btn-secondary btn-sm">Twitter</button>
              <button onclick="sharePost('telegram')" class="btn btn-secondary btn-sm">Telegram</button>
              <button onclick="sharePost('gmail')" class="btn btn-secondary btn-sm">Gmail</button>
              <button onclick="copyLink()" class="btn btn-secondary btn-sm">Copy link</button>
            </div>
          </div>

          <hr class="divider">

          <!-- COMMENTS -->
          <div>
            <h3 style="margin-bottom:16px">Comments <span id="comment-count" style="font-size:0.9rem;color:var(--text-muted);font-weight:normal"></span></h3>

            <div id="comments-list">
              <div class="loading-wrap"><div class="spinner"></div></div>
            </div>

            <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
              <div id="comment-login-prompt" class="hidden" style="margin-bottom:16px">
                <div class="alert alert-info">
                  <a href="/pages/login.html">Log in</a> to leave a comment.
                </div>
              </div>
              <div id="comment-form" class="hidden">
                <div id="comment-alert"></div>
                <textarea id="comment-input" class="form-control" rows="3" placeholder="Share your thoughts..."></textarea>
                <div style="display:flex;justify-content:flex-end;margin-top:8px">
                  <button class="btn btn-primary btn-sm" onclick="submitComment()">Post Comment</button>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- SIDEBAR -->
        <div style="position:sticky;top:80px">
          <div class="card" style="margin-bottom:16px">
            <h4 style="margin-bottom:12px">About the Author</h4>
            <div id="author-card"></div>
          </div>

          <div id="owner-actions" class="hidden">
            <div class="card">
              <h4 style="margin-bottom:10px">Manage Blog</h4>
              <div style="display:flex;flex-direction:column;gap:8px">
                <a id="edit-link" href="#" class="btn btn-secondary btn-sm">Edit</a>
                <button onclick="deleteBlog()" class="btn btn-danger btn-sm">Delete</button>
              </div>
            </div>
          </div>
          
          <div id="report-area" class="hidden" style="margin-top:16px;text-align:center">
            <button onclick="openModal('report-modal')" style="background:none;border:none;font-size:0.78rem;color:var(--text-muted);cursor:pointer;text-decoration:underline;padding:0;">Report this blog</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- REPORT MODAL -->
<div class="modal-overlay" id="report-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Report Blog</h3>
      <button class="modal-close" onclick="closeModal('report-modal')">x</button>
    </div>
    <div id="report-alert"></div>
    <div class="form-group">
      <label>Reason</label>
      <select id="report-reason" class="form-control">
        <option value="spam">Spam</option>
        <option value="misleading">Misleading</option>
        <option value="inappropriate">Inappropriate</option>
        <option value="abuse">Abuse</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Details</label>
      <textarea id="report-details" class="form-control" rows="3" placeholder="Describe the issue..."></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal('report-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="submitReport()">Report</button>
    </div>
  </div>
</div>

<footer class="footer" id="footer"></footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var blogId   = null;
var currentUser = getUser();

document.addEventListener('DOMContentLoaded', async function() {
  var params = new URLSearchParams(window.location.search);
  blogId = params.get('id') || params.get('slug');

  if (!blogId) {
    showErr('No blog specified in the URL.');
    return;
  }

  try {
    var res = await Blogs.get(blogId);
    if (!res || !res.ok) { showErr('Blog not found.'); return; }
    
    var blog = res.data.blog;
    blogId = blog.id; 
    
    renderBlog(blog);
    loadComments(blog.id);
    
    document.getElementById('loading-area').classList.add('hidden');
    document.getElementById('content-area').classList.remove('hidden');
  } catch(e) {
    showErr('Something went wrong loading this blog.');
  }
});

function showErr(msg) {
  document.getElementById('loading-area').classList.add('hidden');
  document.getElementById('error-msg').textContent = msg || 'Blog not found.';
  document.getElementById('error-area').classList.remove('hidden');
}

function escapeHtml(text) {
  if (!text) return '';
  var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

function avatarHtml(url, name, size) {
  var safeSize = size || 32;
  if (url) {
    return '<img src="' + imgUrl(url) + '" alt="' + escapeHtml(name) + '" style="width:' + safeSize + 'px;height:' + safeSize + 'px;border-radius:50%;object-fit:cover">';
  }
  return '<div style="width:' + safeSize + 'px;height:' + safeSize + 'px;border-radius:50%;background:var(--accent);color:#fff;font-size:' + (safeSize * 0.36) + 'px;font-weight:bold;display:flex;align-items:center;justify-content:center">' + initials(name) + '</div>';
}

function renderBlog(blog) {
  document.title = blog.title + ' — Pet Rehoming';

  // SEO Meta Tags
  var oldMeta = document.querySelector('meta[name="description"]');
  if (oldMeta) oldMeta.remove();
  if (blog.summary) {
    var m = document.createElement('meta');
    m.name = 'description';
    m.content = blog.summary;
    document.head.appendChild(m);
  }

  // Category Label (Clickable)
  var catHtml = blog.category_slug
    ? '<a href="/pages/blogs.html?category=' + blog.category_slug + '" style="color:inherit;text-decoration:none">' + (blog.category_name || '') + '</a>'
    : (blog.category_name || '');
  document.getElementById('cat-label').innerHTML = catHtml;

  // Status Badge (Draft)
  var isOwner = currentUser && blog.author_id === currentUser.id;
  var isAdmin = currentUser && currentUser.role === 'admin';
  if ((isOwner || isAdmin) && blog.status !== 'published') {
    var badge = '<span style="display:inline-block;padding:2px 8px;background:var(--bg-muted);border-radius:6px;font-size:0.72rem;color:var(--text-secondary);margin-left:8px;vertical-align:middle">' + (blog.status === 'draft' ? 'DRAFT' : blog.status.toUpperCase()) + '</span>';
    document.getElementById('cat-label').insertAdjacentHTML('beforeend', badge);
  }

  // Title & Summary
  document.getElementById('blog-title').textContent = blog.title;
  if (blog.summary) {
    document.getElementById('blog-title').insertAdjacentHTML('afterend', '<p style="font-size:1rem;color:var(--text-secondary);margin-bottom:16px">' + escapeHtml(blog.summary) + '</p>');
  }

  // Byline Info
  document.getElementById('blog-date').textContent = fmtDate(blog.published_at || blog.created_at);
  document.getElementById('blog-views').textContent = (blog.views || 0) + ' views';
  
  // Reading Time
  var wordCount = (blog.content || '').replace(/<[^>]+>/g, ' ').split(/\s+/).filter(Boolean).length;
  var readMin = Math.max(1, Math.round(wordCount / 200));
  document.getElementById('blog-views').insertAdjacentHTML('afterend', '<span style="color:var(--border)">|</span><span style="font-size:0.84rem;color:var(--text-muted)">' + readMin + ' min read</span>');
  
  // Updated Date
  if (blog.updated_at && new Date(blog.updated_at) > new Date(blog.published_at || blog.created_at)) {
    document.getElementById('blog-views').insertAdjacentHTML('afterend', '<span style="color:var(--border)">|</span><span style="font-size:0.84rem;color:var(--text-muted)">Updated ' + fmtDate(blog.updated_at) + '</span>');
  }

  // Author Info
  var authorHtml = avatarHtml(blog.author_avatar, blog.author_name || 'A', 28) + '<span>' + (blog.author_name || 'Author') + '</span>';
  document.getElementById('author-info').innerHTML = authorHtml;

  document.getElementById('author-card').innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' + avatarHtml(blog.author_avatar, blog.author_name || 'A', 40) + '<div><div style="font-weight:bold;font-size:0.9rem">' + (blog.author_name || 'Author') + '</div></div></div>' +
    '<p style="font-size:0.82rem;color:var(--text-secondary)">Pet care enthusiast sharing knowledge on the Pet Rehoming platform.</p>';

  // Cover Image
  if (blog.cover_image_url) {
    document.getElementById('cover-img-area').innerHTML = '<img src="' + imgUrl(blog.cover_image_url) + '" alt="' + blog.title + '" style="width:100%;border-radius:10px;max-height:400px;object-fit:cover">';
  }

  // Content
  var content = blog.content || '';
  if (!content.includes('<')) {
    content = content.split('\n\n').map(function(para) {
      return para.trim() ? '<p>' + para.replace(/\n/g, '<br>') + '</p>' : '';
    }).join('');
  }
  document.getElementById('blog-content').innerHTML = content;

  // Tags
  var tags = blog.tags || [];
  if (tags.length) {
    var tagsHtml = '<span style="font-size:0.78rem;color:var(--text-muted);align-self:center;margin-right:4px">Tags:</span>';
    tagsHtml += tags.map(function(t) {
      var name = t.name || t;
      return '<a href="/pages/blogs.html?tag=' + encodeURIComponent(name) + '" style="display:inline-block;padding:3px 12px;background:var(--bg-muted);border-radius:999px;font-size:0.78rem;color:var(--text-secondary);text-decoration:none">#' + name + '</a>';
    }).join('');
    document.getElementById('tags-area').innerHTML = tagsHtml;
  }

  // Likes State
  document.getElementById('like-count').textContent = blog.like_count || 0;
  if (blog.liked) {
    document.getElementById('like-btn').innerHTML = '❤️ <span id="like-count" style="margin-left:6px;">' + (blog.like_count || 0) + '</span> Likes';
    document.getElementById('like-btn').style.color = 'var(--danger)';
    document.getElementById('like-btn').style.borderColor = 'var(--danger)';
  }

  // Comments UI Access
  if (currentUser) {
    document.getElementById('comment-form').classList.remove('hidden');
  } else {
    document.getElementById('comment-login-prompt').classList.remove('hidden');
  }

  // Owner Actions
  if (isOwner || isAdmin) {
    document.getElementById('owner-actions').classList.remove('hidden');
    document.getElementById('edit-link').href = '/pages/write-blog.html?id=' + blog.id;
  }

  // Report Button
  if (currentUser && !isOwner) {
    document.getElementById('report-area').classList.remove('hidden');
  }
}

async function toggleLike() {
  if (!getToken()) { window.location.href = '/pages/login.html'; return; }
  var btn = document.getElementById('like-btn');
  try {
    var res = await Blogs.like(blogId);
    if (res && res.ok) {
      var liked = res.data.liked;
      var newCount = res.data.like_count;
      btn.innerHTML = (liked ? '❤️' : '🤍') + ' <span id="like-count" style="margin-left:6px;">' + newCount + '</span> Likes';
      if (liked) {
        btn.style.color = 'var(--danger)';
        btn.style.borderColor = 'var(--danger)';
      } else {
        btn.style.color = 'var(--text-secondary)';
        btn.style.borderColor = 'var(--border)';
      }
    }
  } catch(e) { showToast('Failed to update like.', 'error'); }
}

function sharePost(net) {
  var u = encodeURIComponent(window.location.href);
  var t = encodeURIComponent(document.title);
  var url;
  if (net === 'twitter') {
    url = 'https://twitter.com/intent/tweet?url=' + u + '&text=' + t;
  } else if (net === 'telegram') {
    url = 'https://t.me/share/url?url=' + u + '&text=' + t;
  } else if (net === 'gmail') {
    url = 'https://mail.google.com/mail/?view=cm&fs=1&su=' + t + '&body=' + u;
  }
  window.open(url, '_blank', 'width=600,height=500');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    showToast('Link copied!', 'success');
  });
}

async function loadComments(id) {
  var list = document.getElementById('comments-list');
  try {
    var res = await Blogs.getComments(id);
    if (!res || !res.ok) { list.innerHTML = '<p style="color:var(--danger)">Failed to load comments.</p>'; return; }
    var comments = res.data.comments || [];
    document.getElementById('comment-count').textContent = '(' + comments.length + ')';

    if (!comments.length) {
      list.innerHTML = '<p style="color:var(--text-muted);font-size:0.86rem">No comments yet. Be the first!</p>';
      return;
    }

    list.innerHTML = comments.map(function(c) {
      var canDelete = currentUser && (currentUser.id === c.user_id || currentUser.role === 'admin');
      var avatar = avatarHtml(c.avatar_url, c.user_name || 'U', 32);
      return '<div class="comment-item">' +
        '<div style="display:flex;gap:10px;align-items:flex-start">' +
          '<div class="comment-avatar">' + avatar + '</div>' +
          '<div style="flex:1">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">' +
              '<div style="font-weight:bold;font-size:0.86rem">' + escapeHtml(c.user_name || 'User') + '</div>' +
              '<div style="display:flex;align-items:center;gap:8px">' +
                '<span style="font-size:0.76rem;color:var(--text-muted)">' + timeAgo(c.created_at) + '</span>' +
                (canDelete ? '<button onclick="deleteComment(' + c.id + ')" style="background:none;border:none;color:var(--danger);font-size:0.76rem;cursor:pointer">Delete</button>' : '') +
              '</div>' +
            '</div>' +
            '<p style="font-size:0.88rem;color:var(--text-primary);margin-top:4px;white-space:pre-wrap">' + escapeHtml(c.content) + '</p>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) { list.innerHTML = '<p style="color:var(--danger)">Failed to load comments.</p>'; }
}

async function submitComment() {
  var input = document.getElementById('comment-input');
  var alertEl = document.getElementById('comment-alert');
  var content = input.value.trim();
  alertEl.innerHTML = '';

  if (!content) { alertEl.innerHTML = '<div class="alert alert-danger">Comment cannot be empty.</div>'; return; }

  try {
    var res = await Blogs.addComment(blogId, { content: content });
    if (res && res.ok) {
      input.value = '';
      showToast('Comment posted!', 'success');
      loadComments(blogId);
    } else {
      alertEl.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'Failed.') + '</div>';
    }
  } catch(e) { alertEl.innerHTML = '<div class="alert alert-danger">Something went wrong.</div>'; }
}

async function deleteComment(commentId) {
  if (!confirm('Delete this comment?')) return;
  try {
    var res = await Blogs.deleteComment(blogId, commentId);
    if (res && res.ok) { showToast('Comment deleted.', 'success'); loadComments(blogId); }
    else showToast('Failed.', 'error');
  } catch(e) { showToast('Something went wrong.', 'error'); }
}

async function deleteBlog() {
  if (!confirm('Delete this blog post? This cannot be undone.')) return;
  try {
    var res = await Blogs.delete(blogId);
    if (res && res.ok) {
      showToast('Blog deleted.', 'success');
      setTimeout(function(){ window.location.href = '/pages/blogs.html'; }, 800);
    } else showToast(res.data.message || 'Failed.', 'error');
  } catch(e) { showToast('Something went wrong.', 'error'); }
}

async function submitReport() {
  var reason  = document.getElementById('report-reason').value;
  var details = document.getElementById('report-details').value.trim();
  var alertEl = document.getElementById('report-alert');
  alertEl.innerHTML = '';
  try {
    var res = await Reports.submit({ blog_id: blogId, reason: reason, details: details || undefined });
    if (res && res.ok) { closeModal('report-modal'); showToast('Report submitted.', 'success'); }
    else alertEl.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'Failed.') + '</div>';
  } catch(e) { alertEl.innerHTML = '<div class="alert alert-danger">Something went wrong.</div>'; }
}
</script>
</body>
</html>
