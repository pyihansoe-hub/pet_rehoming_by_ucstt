<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">

    <div class="page-header-row">
      <div>
        <h1>Pet Care Blogs</h1>
        <p style="color:#6b7a8d;margin-top:4px" id="result-count">Loading...</p>
      </div>
      <a href="/pages/write-blog.html" class="btn btn-primary" id="write-btn" style="display:none">+ Write Blog</a>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <input type="text" id="search" class="form-control" style="flex:1;min-width:200px" placeholder="Search blogs..." oninput="debounceSearch()">
      <select id="filter-cat" class="form-control" style="width:180px" onchange="applyFilters()">
        <option value="">All Categories</option>
      </select>
    </div>

    <div id="cat-chips" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px"></div>

    <div id="blog-grid" class="grid-3">
      <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>

    <div id="pagination"></div>

  </div>
</div>

<footer class="footer" id="footer"></footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
var currentPage = 1;
var searchTimer = null;
var LIMIT = 12;

document.addEventListener('DOMContentLoaded', async function() {
  if (getToken()) document.getElementById('write-btn').style.display = 'inline-block';

  try {
    var res = await Blogs.categories();
    if (res && res.ok) {
      var cats = res.data.categories || [];
      var sel = document.getElementById('filter-cat');
      var chips = '<button class="chip active" onclick="setCatChip(this,\'\')">All</button>';
      cats.forEach(function(c) {
        var o = document.createElement('option');
        o.value = c.slug; o.textContent = c.name;
        sel.appendChild(o);
        chips += '<button class="chip" onclick="setCatChip(this,\'' + c.slug + '\')">' + c.name + '</button>';
      });
      document.getElementById('cat-chips').innerHTML = chips;
    }
  } catch(e) {}

  var params = new URLSearchParams(window.location.search);
  if (params.get('category')) {
    document.getElementById('filter-cat').value = params.get('category');
  }

  loadBlogs();
});

function setCatChip(el, val) {
  document.querySelectorAll('#cat-chips .chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('filter-cat').value = val;
  currentPage = 1; loadBlogs();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){ currentPage = 1; loadBlogs(); }, 400);
}

function applyFilters() { currentPage = 1; loadBlogs(); }

async function loadBlogs() {
  var grid = document.getElementById('blog-grid');
  grid.innerHTML = '<div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>';

  var q = { status: 'published', page: currentPage, limit: LIMIT };
  var s = document.getElementById('search').value.trim();
  var c = document.getElementById('filter-cat').value;
  if (s) q.search   = s;
  if (c) q.category = c;

  try {
    var res = await Blogs.list(q);
    if (!res || !res.ok) {
      grid.innerHTML = '<p style="color:#e76f51;grid-column:1/-1">Failed to load blogs.</p>'; return;
    }
    var blogs = res.data.blogs || [];
    var total = res.data.total || 0;
    document.getElementById('result-count').textContent = total + ' article' + (total !== 1 ? 's' : '');

    if (!blogs.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📝</div><h3>No blogs found</h3><p>Try a different search or category.</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = blogs.map(blogCardHtml).join('');
    renderPagination('pagination', total, LIMIT, currentPage, function(p) {
      currentPage = p; loadBlogs(); window.scrollTo(0, 0);
    });
  } catch(e) {
    grid.innerHTML = '<p style="color:#e76f51;grid-column:1/-1">Something went wrong.</p>';
  }
}
</script>
</body>
</html>
