<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Care Blog — Pet Rehoming</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
      else if (t !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    /* ===== Blog Hero ===== */
    .blog-hero {
      text-align: center;
      padding: 56px 20px 40px;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .blog-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }
    .blog-hero h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
      line-height: 1.15;
    }
    .blog-hero p {
      color: var(--text-secondary);
      max-width: 580px;
      margin: 0 auto;
      font-size: 1rem;
      line-height: 1.7;
    }
    #write-btn { margin-top: 22px; }

    /* ===== Filter Bar ===== */
    .blog-toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .blog-toolbar .form-control {
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 11px 16px;
      font-size: 0.92rem;
      background: var(--bg-card);
      color: var(--text-primary);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .blog-toolbar .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light-bg, rgba(0,0,0,0.04));
    }

    /* ===== Category Chips ===== */
    #cat-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ===== Blog Grid ===== */
    .blog-grid-layout {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
    }
    @media(max-width: 768px) {
      .blog-grid-layout { grid-template-columns: 1fr; gap: 24px; }
    }

    .blog-grid-layout .blog-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .blog-grid-layout .blog-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px var(--shadow-md, rgba(0,0,0,0.08));
      border-color: var(--accent);
    }

    .blog-grid-layout .blog-card-img,
    .blog-grid-layout .blog-card-placeholder {
      height: 200px;
      width: 100%;
      border-bottom: 1px solid var(--border);
    }
    .blog-grid-layout .blog-card-img {
      object-fit: cover;
    }
    .blog-grid-layout .blog-card-placeholder {
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--accent-light-bg, #f5f5f5), var(--bg-muted, #eee));
      color: var(--accent);
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
    }

    .blog-grid-layout .blog-card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 22px 24px 20px;
    }
    .blog-grid-layout .blog-card-cat {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .blog-grid-layout .blog-card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s;
    }
    .blog-card:hover .blog-card-title { color: var(--accent); }
    .blog-grid-layout .blog-card-summary {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .blog-grid-layout .blog-card-footer {
      font-size: 0.8rem;
      color: var(--text-muted, var(--text-secondary));
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--border-light, var(--border));
    }
    .blog-card-footer .read-more {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .blog-card-footer .read-more:hover { opacity: 0.75; }

    /* ===== Empty / Loading State ===== */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px 20px;
      color: var(--text-secondary);
    }
    .empty-state-icon {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted, var(--text-secondary));
      margin-bottom: 14px;
    }
    .empty-state h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .empty-state p { font-size: 0.92rem; }

    /* ===== Pagination ===== */
    #pagination {
      margin-top: 44px;
      display: flex;
      justify-content: center;
    }
    #pagination .page-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    #pagination .page-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    #pagination .page-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    #pagination .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">

    <div class="blog-hero">
      <h1>Pet ဆောင်းပါးများ</h1>
      <p>Pet များနှင့်သက်ဆိုင်သောဆောင်းပါးများ ကျွမ်းကျင်ပညာရှင်များရဲ့ပြောဆိုချက်များ အကြံညဏ်များ Pet မွေးမြူရေးအတွက် အထောက်အကူပေးနိုင်သော ဆောင်းပါးများ</p>
      <a href="/pages/write-blog.html" class="btn btn-primary" id="write-btn" style="display:none;">ဆောင်းပါးရေးရန်</a>
    </div>

    <div class="blog-toolbar">
      <input type="text" id="search" class="form-control" style="flex:1;min-width:200px" placeholder="Search articles..." oninput="debounceSearch()">
      <select id="filter-cat" class="form-control" style="width:180px" onchange="applyFilters()">
        <option value="">All Categories</option>
      </select>
    </div>

    <div id="cat-chips"></div>

    <div id="blog-grid" class="blog-grid-layout">
      <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>

    <div id="pagination"></div>

  </div>
</div>

<footer class="footer" id="footer"></footer>

<div id="chat-widget-container"></div>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
var currentPage = 1;
var searchTimer = null;
var LIMIT = 10;

document.addEventListener('DOMContentLoaded', async function() {
  if (getToken()) document.getElementById('write-btn').style.display = 'inline-flex';

  try {
    var res = await Blogs.categories();
    if (res && res.ok) {
      var cats = res.data.categories || [];
      var sel = document.getElementById('filter-cat');
      var chips = '<button class="chip active" onclick="setCatChip(this,\'\')">All</button>';
      cats.forEach(function(c) {
        var o = document.createElement('option');
        o.value = c.slug; o.textContent = c.name;
        sel.appendChild(o);
        chips += '<button class="chip" onclick="setCatChip(this,\'' + c.slug + '\')">' + c.name + '</button>';
      });
      document.getElementById('cat-chips').innerHTML = chips;
    }
  } catch(e) {}

  var params = new URLSearchParams(window.location.search);
  if (params.get('category')) {
    document.getElementById('filter-cat').value = params.get('category');
  }

  loadBlogs();
});

function setCatChip(el, val) {
  document.querySelectorAll('#cat-chips .chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('filter-cat').value = val;
  currentPage = 1; loadBlogs();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){ currentPage = 1; loadBlogs(); }, 400);
}

function applyFilters() { currentPage = 1; loadBlogs(); }

async function loadBlogs() {
  var grid = document.getElementById('blog-grid');
  grid.innerHTML = '<div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>';

  var q = { status: 'published', page: currentPage, limit: LIMIT };
  var s = document.getElementById('search').value.trim();
  var c = document.getElementById('filter-cat').value;
  if (s) q.search   = s;
  if (c) q.category = c;

  try {
    var res = await Blogs.list(q);
    if (!res || !res.ok) {
      grid.innerHTML = '<p style="color:var(--danger);grid-column:1/-1;text-align:center;padding:40px">Failed to load blogs.</p>'; return;
    }
    var blogs = res.data.blogs || [];
    var total = res.data.total || 0;
    var countEl = document.querySelector('.blog-hero p');
    if(countEl) countEl.textContent = 'Pet များနှင့်သက်ဆိုင်သောဆောင်းပါးများ ကျွမ်းကျင်ပညာရှင်များရဲ့ပြောဆိုချက်များ ဆောင်းပါး ' + total + ' ရနိုင်သည်။';

    if (!blogs.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">No articles</div><h3>No articles found</h3><p>Try a different search or category.</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = blogs.map(blogCardHtml).join('');
    renderPagination('pagination', total, LIMIT, currentPage, function(p) {
      currentPage = p; loadBlogs(); window.scrollTo(0, 0);
    });
  } catch(e) {
    grid.innerHTML = '<p style="color:var(--danger);grid-column:1/-1;text-align:center;padding:40px">Something went wrong.</p>';
  }
}
</script>

<script>
function loadChatWidget() {
  var container = document.getElementById('chat-widget-container');
  if (!container) return;

  container.innerHTML =
    '<button class="support-fab" id="support-fab" onclick="toggleChatWidget()" title="PawBot ကိုမေးပါ">' +
      '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/><path d="M7 9h10v1.5H7zm0-3h10v1.5H7zm0 6h7v1.5H7z"/></svg>' +
      '<span class="support-fab-badge"></span>' +
    '</button>' +
    '<div class="chat-widget" id="chat-widget">' +
      '<div class="chat-widget-header">' +
        '<div class="bot-avatar-sm">PB</div>' +
        '<div class="bot-info">' +
          '<div class="bot-name">PawBot</div>' +
          '<div class="bot-status">အွန်လိုင်း — ပုံမှန်အားဖြင့် ချက်ချင်းပြန်ကြားပါသည်</div>' +
        '</div>' +
        '<button class="close-btn" onclick="toggleChatWidget()">&times;</button>' +
      '</div>' +
      '<div class="chat-widget-messages" id="widget-messages">' +
        '<div class="chat-msg bot">' +
          '<div class="chat-bubble"><p>မင်္ဂလာပါ။ ကျွန်ုပ်က <strong>PawBot</strong> ဖြစ်ပါတယ်။</p><p>အိမ်မွေးတိရစ္ဆာန် စောင့်ရှောက်နည်းများ၊ မွေးစားခြင်းဆိုင်ရာ အကြံဉာဏ်များနှင့် ပလက်ဖောင်းဆိုင်ရာ မေးခွန်းများအတွက် ကူညီနိုင်ပါတယ်။</p><p>ဘာကိုသိချင်ပါသလဲ။</p></div>' +
        '</div>' +
      '</div>' +
      '<div class="chat-widget-suggestions" id="widget-suggestions">' +
        '<button class="suggestion-chip-sm" onclick="widgetSend(this.textContent)">အိမ်မွေးတိရစ္ဆာန်တစ်ကောင်ကို ဘယ်လိုမွေးစားရမလဲ။</button>' +
        '<button class="suggestion-chip-sm" onclick="widgetSend(this.textContent)">ခွေးစောင့်ရှောက်နည်း အကြံပြုချက်များ</button>' +
        '<button class="suggestion-chip-sm" onclick="widgetSend(this.textContent)">ကြောင် အာဟာရ</button>' +
      '</div>' +
      '<div class="chat-widget-input">' +
        '<textarea id="widget-input" placeholder="စာတိုရိုက်ထည့်ပါ..." rows="1" onkeydown="widgetHandleKey(event)" oninput="widgetAutoResize(this)"></textarea>' +
        '<button class="send-btn" onclick="widgetSendMsg()" title="ပို့ရန်">' +
          '<svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>';

  var fabBtn = document.getElementById('support-fab');
  if (fabBtn) {
    fabBtn.addEventListener('click', function() {
      var badge = this.querySelector('.support-fab-badge');
      if (badge) badge.style.display = 'none';
    });
  }
}

function toggleChatWidget() {
  var widget = document.getElementById('chat-widget');
  if (!widget) return;
  widget.classList.toggle('open');
  if (widget.classList.contains('open')) {
    setTimeout(function() {
      var msgArea = document.getElementById('widget-messages');
      if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
      var input = document.getElementById('widget-input');
      if (input) input.focus();
    }, 100);
  }
}

var widgetWaiting = false;
var widgetSessionId = null;

function widgetHandleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); widgetSendMsg(); }
}

function widgetAutoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function widgetSend(text) {
  var input = document.getElementById('widget-input');
  if (input) {
    input.value = text;
    widgetSendMsg();
  }
}

async function widgetSendMsg() {
  var input = document.getElementById('widget-input');
  if (!input) return;
  var msg = input.value.trim();
  if (!msg || widgetWaiting) return;

  input.value = '';
  input.style.height = 'auto';
  var sugg = document.getElementById('widget-suggestions');
  if (sugg) sugg.style.display = 'none';
  widgetWaiting = true;

  widgetAddUserMsg(msg);
  var botBubble = widgetAddBotBubble();

  try {
    var streamUrl;

    if (getToken()) {
      if (!widgetSessionId) {
        var sessRes = await Chat.createSession();
        if (sessRes && sessRes.ok) {
          widgetSessionId = sessRes.data.session.id;
        }
      }
      streamUrl = '/api/chat/sessions/' + widgetSessionId + '/stream?message=' + encodeURIComponent(msg);
    } else {
      streamUrl = '/api/chat/stream?message=' + encodeURIComponent(msg);
    }

    var token = getToken();
    var fullUrl = token ? streamUrl + '&token=' + token : streamUrl;

    botBubble.innerHTML = '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';

    var es = new EventSource(fullUrl);
    var fullText = '';
    var started = false;

    es.onmessage = function(e) {
      try {
        var data = JSON.parse(e.data);
        if (data.error) {
          botBubble.innerHTML = 'တောင်းပန်ပါတယ်၊ အမှားတစ်ခု ဖြစ်ပွားခဲ့ပါတယ်။';
          es.close();
          widgetWaiting = false;
          return;
        }
        if (data.token) {
          if (!started) { botBubble.innerHTML = ''; started = true; }
          fullText += data.token;
          botBubble.innerHTML = widgetEscape(fullText);
          widgetScrollDown();
        }
        if (data.done) {
          es.close();
          botBubble.innerHTML = widgetEscape(fullText);
          widgetScrollDown();
          widgetWaiting = false;
        }
      } catch(err) {}
    };

    es.onerror = function() {
      es.close();
      if (!started) botBubble.innerHTML = 'ချိတ်ဆက်မှု ပြတ်တောက်သွားပါတယ်။ ထပ်မံကြိုးစားပါ။';
      widgetWaiting = false;
    };

  } catch(e) {
    botBubble.innerHTML = 'တောင်းပန်ပါတယ်၊ တစ်ခုခု မှားယွင်းသွားပါတယ်။';
    widgetWaiting = false;
  }
}

function widgetAddUserMsg(text) {
  var area = document.getElementById('widget-messages');
  if (!area) return;
  var div = document.createElement('div');
  div.className = 'chat-msg user';
  div.innerHTML = '<div class="chat-bubble">' + widgetEscape(text) + '</div>';
  area.appendChild(div);
  widgetScrollDown();
}

function widgetAddBotBubble() {
  var area = document.getElementById('widget-messages');
  if (!area) return null;
  var div = document.createElement('div');
  div.className = 'chat-msg bot';
  var bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  bubble.innerHTML = '';
  div.appendChild(bubble);
  area.appendChild(div);
  widgetScrollDown();
  return bubble;
}

function widgetScrollDown() {
  var area = document.getElementById('widget-messages');
  if (area) area.scrollTop = area.scrollHeight;
}

function widgetEscape(text) {
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  safe = safe.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
  var lines = safe.split('\n');
  var html = '';
  var inList = false;
  lines.forEach(function(line) {
    if (line.match(/^[\-\*] /)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + line.replace(/^[\-\*] /, '') + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line.trim()) html += '<p>' + line + '</p>';
    }
  });
  if (inList) html += '</ul>';
  return html || '<p>' + safe + '</p>';
}

loadChatWidget();
</script>
</body>
</html>
