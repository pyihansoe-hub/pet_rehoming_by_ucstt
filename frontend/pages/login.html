<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>အကောင့်ဝင်ရန်</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:420px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        
        <h1 style="font-size:1.5rem;margin-bottom:6px">PetNet မှပြန်လည်ကြိုဆိုပါသည်</h1>
        <p style="color:#6b7a8d;font-size:0.9rem">သင်၏အကောင့်သို့ ဝင်ရောက်ပါ</p>
      </div>

      <div class="card">
        <div id="alert-area"></div>

        <div class="form-group">
          <label for="email">အီးမေးလ်</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="password">စကားဝှက်</label>
          <input type="password" id="password" class="form-control" placeholder="သင်၏စကားဝှက် ထည့်ပါ">
        </div>

        <div style="text-align:right;margin-bottom:16px">
          <a href="/pages/forgot-password.html" style="font-size:0.84rem;color:#6b7a8d">စကားဝှက် မေ့နေပါသလား။</a>
        </div>

        <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">အကောင့်ဝင်ရန်</button>

        <hr class="divider">
        <p style="text-align:center;font-size:0.86rem;color:#6b7a8d">
          အကောင့်မရှိသေးပါသလား။ <a href="/pages/register.html">အကောင့်ဖွင့်ရန်</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="/../js/app.js"></script>
<script>
if (getToken()) window.location.href = '/index.html';

async function doLogin() {
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var alertArea = document.getElementById('alert-area');
  var btn = document.getElementById('login-btn');

  alertArea.innerHTML = '';
  if (!email || !password) {
    alertArea.innerHTML = '<div class="alert alert-danger">အီးမေးလ်နှင့် စကားဝှက် လိုအပ်ပါသည်။</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'အကောင့်ဝင်နေသည်...';

  try {
    var res = await Auth.login({ email: email, password: password });
    if (res && res.ok) {
      saveAuth(res.data.token, res.data.user);
      showToast('ပြန်လည်ကြိုဆိုပါသည်၊ ' + res.data.user.name + '။', 'success');
      setTimeout(function() { window.location.href = '/index.html'; }, 600);
    } else {
      alertArea.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'အကောင့်ဝင်၍မရပါ။') + '</div>';
    }
  } catch(e) {
    alertArea.innerHTML = '<div class="alert alert-danger">တစ်ခုခု မှားယွင်းသွားသည်။ ထပ်မံကြိုးစားပါ။</div>';
  }

  btn.disabled = false;
  btn.textContent = 'အကောင့်ဝင်ရန်';
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
</body>
</html>
