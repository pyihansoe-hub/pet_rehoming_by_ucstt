<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>အကောင့်ဝင်ရန်</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:420px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        <h1 style="font-size:1.5rem;margin-bottom:6px">PetNet မှပြန်လည်ကြိုဆိုပါသည်</h1>
        <p style="color:#6b7a8d;font-size:0.9rem">သင်၏အကောင့်သို့ ဝင်ရောက်ပါ</p>
      </div>

      <!-- LOGIN FORM CARD -->
      <div class="card" id="login-card">
        <div id="alert-area"></div>

        <div class="form-group">
          <label for="email">အီးမေးလ်</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="password">စကားဝှက်</label>
          <input type="password" id="password" class="form-control" placeholder="သင်၏စကားဝှက် ထည့်ပါ">
        </div>

        <div style="text-align:right;margin-bottom:16px">
          <a href="/pages/forgot-password.html" style="font-size:0.84rem;color:#6b7a8d">စကားဝှက် မေ့နေပါသလား။</a>
        </div>

        <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">အကောင့်ဝင်ရန်</button>

        <hr class="divider">
        <p style="text-align:center;font-size:0.86rem;color:#6b7a8d">
          အကောင့်မရှိသေးပါသလား။ <a href="/pages/register.html">အကောင့်ဖွင့်ရန်</a>
        </p>
      </div>

      <!-- TOTP 6-DIGIT CODE CARD (Hidden initially, NO QR CODE HERE) -->
      <div class="card" id="totp-card" style="display:none; text-align:center;">
        <h2 style="font-size:1.2rem; margin-bottom:10px;">Authenticator ဖြင့် အတည်ပြုပါ</h2>
        <p style="color:#6b7a8d; font-size:0.86rem; margin-bottom:20px;">
          သင်၏ Google Authenticator App ကို ဖွင့်ပြီး ပေါ်လာသော 6 လုံး ကုဒ်ကို ထည့်ပါ။
        </p>
        
        <div class="form-group" style="text-align:left;">
          <label for="totp-code">6 လုံး ကုဒ် <span style="color:#e76f51">*</span></label>
          <input type="text" id="totp-code" class="form-control" placeholder="123456" maxlength="6" inputmode="numeric" style="text-align:center; letter-spacing: 4px; font-size: 1.2rem;">
        </div>
        
        <div id="totp-alert"></div>
        
        <button type="button" class="btn btn-primary btn-full" id="verify-btn" onclick="verifyLoginTOTP()">အတည်ပြုရန်</button>
        <button type="button" onclick="cancelTOTP()" style="margin-top:10px; color:#6b7a8d; background:none; border:none; cursor:pointer;">နောက်သို့ ပြန်သွားရန်</button>
      </div>

    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
if (getToken()) window.location.href = '/index.html';

async function doLogin() {
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var alertArea = document.getElementById('alert-area');
  var btn = document.getElementById('login-btn');

  alertArea.innerHTML = '';
  if (!email || !password) {
    alertArea.innerHTML = '<div class="alert alert-danger">အီးမေးလ်နှင့် စကားဝှက် လိုအပ်ပါသည်။</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'အကောင့်ဝင်နေသည်...';

  try {
    var res = await Auth.login({ email: email, password: password });
    
    // LOG THE RESPONSE so we can see what api.js returns
    console.log("Login API Response:", res); 

    // Safely check for 2FA (handles both res.data.requireTwoFactor and res.requireTwoFactor)
    var is2FA = (res && res.data && res.data.requireTwoFactor) || (res && res.requireTwoFactor);
    
    if (is2FA) {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('totp-card').style.display = 'block';
      document.getElementById('totp-code').focus();
    } 
    // Normal login success (handles both res.data.token and res.token)
    else if ((res && res.data && res.data.token) || (res && res.token)) {
      var token = (res.data && res.data.token) ? res.data.token : res.token;
      var user = (res.data && res.data.user) ? res.data.user : res.user;
      
      saveAuth(token, user);
      showToast('ပြန်လည်ကြိုဆိုပါသည်၊ ' + user.name + '။', 'success');
      setTimeout(function() { window.location.href = '/index.html'; }, 600);
    } else {
      // Safely extract error message
      var errMsg = 'အကောင့်ဝင်၍မရပါ။';
      if (res && res.data && res.data.message) errMsg = res.data.message;
      else if (res && res.message) errMsg = res.message;
      
      alertArea.innerHTML = '<div class="alert alert-danger">' + errMsg + '</div>';
    }
  } catch(e) {
    // LOG THE EXACT ERROR
    console.error("Login Catch Error:", e);
    alertArea.innerHTML = '<div class="alert alert-danger">တစ်ခုခု မှားယွင်းသွားသည်။ ထပ်မံကြိုးစားပါ။</div>';
  }

  btn.disabled = false;
  btn.textContent = 'အကောင့်ဝင်ရန်';
}

async function verifyLoginTOTP() {
  var email    = document.getElementById('email').value.trim();
  var token    = document.getElementById('totp-code').value.trim();
  var alertArea = document.getElementById('totp-alert');
  var btn = document.getElementById('verify-btn');

  if (!token || token.length !== 6) {
    alertArea.innerHTML = '<div class="alert alert-danger">ကျေးဇူးပြု၍ ကုဒ် ၆ လုံး ထည့်ပါ။</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'အတည်ပြုနေသည်...';

  try {
    var res = await Auth.verifyTOTP({ email: email, token: token });
    console.log("TOTP API Response:", res);

    if ((res && res.data && res.data.token) || (res && res.token)) {
      var authToken = (res.data && res.data.token) ? res.data.token : res.token;
      var user = (res.data && res.data.user) ? res.data.user : res.user;
      
      saveAuth(authToken, user);
      showToast('ပြန်လည်ကြိုဆိုပါသည်၊ ' + user.name + '။', 'success');
      setTimeout(function() { window.location.href = '/index.html'; }, 600);
    } else {
      var errMsg = 'ကုဒ် မမှန်ကန်ပါ။';
      if (res && res.data && res.data.message) errMsg = res.data.message;
      else if (res && res.message) errMsg = res.message;
      
      alertArea.innerHTML = '<div class="alert alert-danger">' + errMsg + '</div>';
    }
  } catch(e) {
    console.error("TOTP Catch Error:", e);
    alertArea.innerHTML = '<div class="alert alert-danger">တစ်ခုခု မှားယွင်းသွားသည်။ ထပ်မံကြိုးစားပါ။</div>';
  }

  btn.disabled = false;
  btn.textContent = 'အတည်ပြုရန်';
}

function cancelTOTP() {
  document.getElementById('totp-code').value = '';
  document.getElementById('totp-alert').innerHTML = '';
  document.getElementById('totp-card').style.display = 'none';
  document.getElementById('login-card').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('totp-code').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verifyLoginTOTP();
  });
});
</script>
</body>
</html>
