<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Pet Rehoming</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>
<div id="toast-container" class="toast-container"></div>

<div class="page-wrap">
  <div class="container">
    <div style="max-width:420px;margin:0 auto">

      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:2.5rem;margin-bottom:8px">🐾</div>
        <h1 style="font-size:1.5rem;margin-bottom:6px">Welcome back</h1>
        <p style="color:#6b7a8d;font-size:0.9rem">Log in to your account</p>
      </div>

      <div class="card">
        <div id="alert-area"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password">
        </div>

        <div style="text-align:right;margin-bottom:16px">
          <a href="/pages/forgot-password.html" style="font-size:0.84rem;color:#6b7a8d">Forgot password?</a>
        </div>

        <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Log In</button>

        <hr class="divider">
        <p style="text-align:center;font-size:0.86rem;color:#6b7a8d">
          Don't have an account? <a href="/pages/register.html">Register</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="/../js/app.js"></script>
<script>
// redirect if already logged in
if (getToken()) window.location.href = '/index.html';

async function doLogin() {
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var alertArea = document.getElementById('alert-area');
  var btn = document.getElementById('login-btn');

  alertArea.innerHTML = '';
  if (!email || !password) {
    alertArea.innerHTML = '<div class="alert alert-danger">Email and password are required.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    var res = await Auth.login({ email: email, password: password });
    if (res && res.ok) {
      saveAuth(res.data.token, res.data.user);
      showToast('Welcome back, ' + res.data.user.name + '!', 'success');
      setTimeout(function() { window.location.href = '/index.html'; }, 600);
    } else {
      alertArea.innerHTML = '<div class="alert alert-danger">' + (res.data.message || 'Login failed.') + '</div>';
    }
  } catch(e) {
    alertArea.innerHTML = '<div class="alert alert-danger">Something went wrong. Try again.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Log In';
}

// allow Enter key
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
</body>
</html>
