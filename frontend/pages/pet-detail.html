<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Detail - PetLink</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="logo">🐾 PetLink</a>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="pets.html">Pets</a></li>
                <li class="auth-only"><a href="dashboard.html">Dashboard</a></li>
                <li class="auth-only"><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <button onclick="history.back()" class="btn btn-secondary btn-sm mb-20">← Back</button>
            
            <div id="petDetail">
                <div class="loading">Loading pet details...</div>
            </div>
        </div>
    </main>

    <!-- Adoption Request Modal -->
    <div id="adoptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Request to Adopt</h3>
                <button class="modal-close" onclick="closeAdoptModal()">&times;</button>
            </div>
            <form id="adoptForm">
                <input type="hidden" id="adoptPetId">
                <div class="form-group">
                    <label>Message to Owner (Optional)</label>
                    <textarea id="adoptMessage" class="form-control" rows="4" placeholder="Tell the owner why you'd be a great fit for this pet..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit Request</button>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/pet-detail.js"></script>
</body>
</html>
